<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manager Dashboard — WorkHive</title>
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet" />
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --font-display: "Cabinet Grotesk", sans-serif;
        --font-body: "Inter", sans-serif;
        --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
        --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
        --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
        --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
        --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
        --sp1: 0.25rem; --sp2: 0.5rem; --sp3: 0.75rem; --sp4: 1rem;
        --sp5: 1.25rem; --sp6: 1.5rem; --sp8: 2rem; --sp10: 2.5rem;
        --sp12: 3rem; --r-sm: 0.375rem; --r-md: 0.5rem; --r-lg: 0.75rem;
        --r-xl: 1rem; --r-full: 9999px;
        --tr: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      :root, [data-theme="light"] {
        --bg: #f7f6f2; --surf: #f9f8f5; --surf2: #fbfbf9; --surfoff: #f3f0ec;
        --div: #dcd9d5; --bdr: #d4d1ca; --txt: #28251d; --txtm: #7a7974;
        --txtf: #bab9b4; --txti: #f9f8f4; --pr: #01696f; --prh: #0c4e54;
        --prhi: #cedcd8; --err: #a12c7b; --suc: #437a22; --warn: #964219;
        --shsm: 0 1px 2px oklch(0.2 0.01 80/0.06);
        --shmd: 0 4px 12px oklch(0.2 0.01 80/0.08);
        --shlg: 0 12px 32px oklch(0.2 0.01 80/0.12);
      }
      [data-theme="dark"] {
        --bg: #171614; --surf: #1c1b19; --surf2: #201f1d; --surfoff: #1d1c1a;
        --div: #262523; --bdr: #393836; --txt: #cdccca; --txtm: #797876;
        --txtf: #5a5957; --txti: #2b2a28; --pr: #4f98a3; --prh: #227f8b;
        --prhi: #313b3b; --err: #d163a7; --suc: #6daa45; --warn: #bb653b;
        --shsm: 0 1px 2px oklch(0 0 0/0.2);
        --shmd: 0 4px 12px oklch(0 0 0/0.3);
        --shlg: 0 12px 32px oklch(0 0 0/0.4);
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: var(--r-full); border: 2px solid transparent; background-clip: content-box; }
      ::-webkit-scrollbar-thumb:hover { background: var(--pr); }
      * { scrollbar-width: thin; scrollbar-color: var(--bdr) transparent; }

      /* Calendar */
      .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--sp5); }
      .cal-title { font-size:var(--text-lg); font-weight:800; }
      .cal-nav { display:flex; gap:var(--sp2); }
      .cal-nav button { width:32px; height:32px; border-radius:var(--r-md); border:1px solid var(--bdr); display:flex; align-items:center; justify-content:center; color:var(--txtm); }
      .cal-nav button:hover { background:var(--surfoff); color:var(--txt); }
      .cal-weekdays { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:var(--sp2); }
      .cal-weekday { text-align:center; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--txtm); padding:var(--sp1) 0; }
      .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
      .cal-day { min-height:80px; border-radius:var(--r-md); border:1px solid var(--bdr); padding:var(--sp2); background:var(--surf2); transition:0.15s; cursor:pointer; }
      .cal-day:hover { border-color:var(--pr); background:var(--prhi); }
      .cal-day.today { border-color:var(--pr); background:var(--prhi); }
      .cal-day.today .cal-day-num { background:var(--pr); color:var(--txti); }
      .cal-day.other-month { opacity:0.3; cursor:default; }
      .cal-day-num { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:var(--text-xs); font-weight:700; color:var(--txt); margin-bottom:var(--sp1); }
      .cal-events { display:flex; flex-direction:column; gap:2px; }
      .cal-event { font-size:10px; font-weight:600; padding:1px 5px; border-radius:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .cal-event.task { background:oklch(from var(--warn) l c h/0.15); color:var(--warn); }
      .cal-event.deadline { background:oklch(from var(--err) l c h/0.15); color:var(--err); }
      .cal-event.project { background:oklch(from var(--pr) l c h/0.15); color:var(--pr); }
      .cal-event.sub { background:oklch(from var(--suc) l c h/0.15); color:var(--suc); }
      .cal-event.billing { background:oklch(from var(--err) l c h/0.15); color:var(--err); }
      .cal-dot { width:6px; height:6px; border-radius:50%; display:inline-block; }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { -webkit-font-smoothing: antialiased; }
      body { font-family: var(--font-body); font-size: var(--text-sm); color: var(--txt); background: var(--bg); display: flex; height: 100dvh; overflow: hidden; }
      h1,h2,h3,h4 { font-family: var(--font-display); line-height: 1.2; }
      button, a { transition: color var(--tr), background var(--tr), border-color var(--tr); cursor: pointer; }
      button { border: none; background: none; font: inherit; color: inherit; }
      [x-cloak] { display: none !important; }

      /* Sidebar */
      .sidebar { width: 240px; min-width: 240px; background: var(--surf); border-right: 1px solid var(--div); display: flex; flex-direction: column; height: 100dvh; position: sticky; top: 0; overflow-y: auto; }
      .sb-logo { display: flex; align-items: center; gap: var(--sp2); padding: var(--sp6) var(--sp5); font-family: var(--font-display); font-weight: 800; font-size: var(--text-base); color: var(--txt); text-decoration: none; border-bottom: 1px solid var(--div); }
      .sb-section { padding: var(--sp4) var(--sp3); font-size: var(--text-xs); font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--txtf); margin-top: var(--sp4); }
      .sb-item { display: flex; align-items: center; gap: var(--sp3); padding: var(--sp2) var(--sp4); border-radius: var(--r-lg); margin: 0 var(--sp2); font-size: var(--text-sm); color: var(--txtm); text-decoration: none; }
      .sb-item:hover, .sb-item.active { background: var(--surfoff); color: var(--txt); }
      .sb-item.active { color: var(--pr); font-weight: 600; }
      .sb-item svg { width: 16px; height: 16px; flex-shrink: 0; }
      .sb-bottom { margin-top: auto; padding: var(--sp4); border-top: 1px solid var(--div); }
      .sb-user { display: flex; align-items: center; gap: var(--sp3); }
      .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--prhi); display: flex; align-items: center; justify-content: center; font-size: var(--text-xs); font-weight: 700; color: var(--pr); flex-shrink: 0; }
      .user-name { font-size: var(--text-sm); font-weight: 600; color: var(--txt); }
      .user-role { font-size: var(--text-xs); color: var(--txtm); text-transform: capitalize; }

      /* Main */
      .main { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; overflow: hidden; }
      .topbar { display: flex; align-items: center; justify-content: space-between; padding: var(--sp4) var(--sp8); border-bottom: 1px solid var(--div); background: var(--surf); position: sticky; top: 0; z-index: 10; }
      .page-title { font-size: var(--text-lg); font-weight: 800; }
      .topbar-right { display: flex; align-items: center; gap: var(--sp3); }
      .icon-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: var(--r-md); border: 1px solid var(--bdr); color: var(--txtm); }
      .icon-btn:hover { background: var(--surfoff); }
      .content { flex: 1; min-height: 0; overflow-y: auto; padding: var(--sp8); }

      /* KPI */
      .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(190px, 100%), 1fr)); gap: var(--sp5); margin-bottom: var(--sp8); }
      .kpi { background: var(--surf); border: 1px solid var(--bdr); border-radius: var(--r-xl); padding: var(--sp6); }
      .kpi-label { font-size: var(--text-xs); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--txtm); margin-bottom: var(--sp2); }
      .kpi-val { font-size: var(--text-xl); font-weight: 800; font-family: var(--font-display); font-variant-numeric: tabular-nums; }
      .kpi-sub { font-size: var(--text-xs); color: var(--txtm); margin-top: var(--sp1); }

      /* Section */
      .section { background: var(--surf); border: 1px solid var(--bdr); border-radius: var(--r-xl); margin-bottom: var(--sp6); }
      .section-head { display: flex; align-items: center; justify-content: space-between; padding: var(--sp5) var(--sp6); border-bottom: 1px solid var(--div); }
      .section-head h2 { font-size: var(--text-base); font-weight: 700; }

      /* Buttons */
      .btn-sm { padding: var(--sp1) var(--sp4); font-size: var(--text-xs); font-weight: 600; border-radius: var(--r-md); background: var(--pr); color: var(--txti); border: none; }
      .btn-sm:hover { background: var(--prh); }
      .btn-sm.ghost { background: transparent; color: var(--txtm); border: 1px solid var(--bdr); }
      .btn-sm.ghost:hover { background: var(--surfoff); color: var(--txt); }

      /* Table */
      .tbl-wrap { overflow-x: auto; }
      table { width: 100%; border-collapse: collapse; }
      th { padding: var(--sp3) var(--sp4); text-align: left; font-size: var(--text-xs); font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--txtm); border-bottom: 1px solid var(--div); }
      td { padding: var(--sp3) var(--sp4); font-size: var(--text-sm); border-bottom: 1px solid var(--div); }
      tr:last-child td { border-bottom: none; }
      tr:hover td { background: var(--surfoff); }

      /* Badges */
      .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: var(--r-full); font-size: 11px; font-weight: 600; white-space: nowrap; }
      .badge-completed { background: oklch(from var(--pr) l c h / 0.15); color: var(--pr); }
      .badge-in_progress { background: oklch(from var(--warn) l c h / 0.15); color: var(--warn); }
      .badge-pending { background: oklch(from var(--txtm) l c h / 0.12); color: var(--txtm); }
      .badge-high { background: oklch(from var(--err) l c h / 0.12); color: var(--err); }
      .badge-critical { background: oklch(from var(--err) l c h / 0.2); color: var(--err); }
      .badge-medium { background: oklch(from var(--warn) l c h / 0.12); color: var(--warn); }
      .badge-low { background: oklch(from var(--txtm) l c h / 0.1); color: var(--txtm); }
      .badge-open { background: oklch(from var(--warn) l c h / 0.12); color: var(--warn); }
      .badge-resolved { background: oklch(from var(--pr) l c h / 0.12); color: var(--pr); }

      /* Progress */
      .prog-wrap { background: var(--surfoff); border-radius: var(--r-full); height: 6px; overflow: hidden; }
      .prog-bar { height: 100%; background: var(--pr); border-radius: var(--r-full); }

      /* Charts */
      .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp6); margin-bottom: var(--sp6); }
      .chart-card { background: var(--surf); border: 1px solid var(--bdr); border-radius: var(--r-xl); padding: var(--sp6); }
      .chart-title { font-size: var(--text-sm); font-weight: 700; margin-bottom: var(--sp5); }

      /* Modal */
      .modal-bg { position: fixed; inset: 0; background: oklch(0 0 0/0.45); z-index: 100; display: flex; align-items: center; justify-content: center; padding: var(--sp4); }
      .modal { background: var(--surf); border-radius: var(--r-xl); padding: var(--sp8); width: 100%; max-width: 480px; box-shadow: var(--shlg); max-height: 90dvh; overflow-y: auto; }
      .modal h3 { font-size: var(--text-lg); font-weight: 800; margin-bottom: var(--sp6); }
      .field { margin-bottom: var(--sp4); }
      .field label { display: block; font-size: var(--text-xs); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--txtm); margin-bottom: var(--sp1); }
      .field input, .field select, .field textarea { width: 100%; padding: var(--sp2) var(--sp3); border: 1px solid var(--bdr); border-radius: var(--r-md); background: var(--surf2); color: var(--txt); font-size: var(--text-sm); font-family: var(--font-body); }
      .field input:focus, .field select:focus, .field textarea:focus { outline: 2px solid var(--pr); outline-offset: 1px; }
      .modal-btns { display: flex; gap: var(--sp3); justify-content: flex-end; margin-top: var(--sp6); }

      /* Toast */
      .toast-wrap { position: fixed; top: var(--sp6); right: var(--sp6); z-index: 200; display: flex; flex-direction: column; gap: var(--sp2); }
      .toast { background: var(--surf); border: 1px solid var(--bdr); border-radius: var(--r-lg); padding: var(--sp3) var(--sp5); font-size: var(--text-sm); box-shadow: var(--shmd); display: flex; align-items: center; gap: var(--sp2); min-width: 240px; }
      .toast.success { border-color: var(--suc); color: var(--suc); }
      .toast.error { border-color: var(--err); color: var(--err); }

      /* Member card */
      .member-card { display: flex; align-items: center; justify-content: space-between; padding: var(--sp4) var(--sp6); border-bottom: 1px solid var(--div); }
      .member-card:last-child { border-bottom: none; }

      @media (max-width: 768px) {
        .sidebar { display: none; }
        .chart-grid { grid-template-columns: 1fr; }
      }
    
    /* ══════════════════════════════════════════════════
       3D DESIGN SYSTEM — WorkHive Manager Dashboard
       Floating depth · Glow · Particle network · Scroll reveals
    ══════════════════════════════════════════════════ */
    :root { --glow-pr: 0 0 24px oklch(from var(--pr) l c h / 0.18); }
    #bg-canvas { position:fixed; inset:0; z-index:-1; pointer-events:none; }

    .kpi { position:relative; border:1px solid oklch(from var(--pr) l c h / 0.18) !important; transform-style:preserve-3d; transform:perspective(600px) rotateX(0deg) rotateY(0deg) translateZ(0); transition:transform 0.4s cubic-bezier(0.16,1,0.3,1), box-shadow 0.4s cubic-bezier(0.16,1,0.3,1), border-color 0.3s ease !important; box-shadow:0 4px 16px oklch(0.1 0.01 200/0.12), 0 1px 0 oklch(from var(--pr) l c h / 0.08) inset !important; overflow:visible !important; }
    .kpi::before { content:''; position:absolute; inset:0; border-radius:inherit; background:linear-gradient(135deg, oklch(from var(--pr) l c h / 0.06), transparent 60%); pointer-events:none; z-index:0; }
    .kpi::after { content:''; position:absolute; top:-1px; left:10%; right:10%; height:1px; background:linear-gradient(90deg, transparent, oklch(from var(--pr) l c h / 0.5), transparent); }
    .kpi:hover { transform:perspective(600px) rotateX(-4deg) rotateY(4deg) translateZ(16px) !important; box-shadow:0 20px 40px oklch(0.1 0.02 200/0.2), var(--glow-pr) !important; border-color:oklch(from var(--pr) l c h / 0.5) !important; z-index:5; }
    .kpi > * { position:relative; z-index:1; }
    .kpi-val { background:linear-gradient(135deg, var(--txt), oklch(from var(--pr) l c h / 0.85)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }

    .section { position:relative; border:1px solid oklch(from var(--pr) l c h / 0.14) !important; box-shadow:0 8px 24px oklch(0.1 0.01 200/0.1), 0 1px 0 oklch(from var(--pr) l c h / 0.07) inset !important; overflow:hidden; transition:box-shadow 0.35s ease, border-color 0.3s ease !important; }
    .section::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg, transparent 10%, oklch(from var(--pr) l c h / 0.35) 50%, transparent 90%); }
    .section-head { background:linear-gradient(180deg, oklch(from var(--pr) l c h / 0.04), transparent) !important; }
    .section-head h2::before { content:''; display:inline-block; width:3px; height:1em; background:linear-gradient(180deg, var(--pr), transparent); border-radius:2px; margin-right:8px; vertical-align:middle; box-shadow:0 0 6px var(--pr); }

    .chart-card { position:relative; border:1px solid oklch(from var(--pr) l c h / 0.16) !important; box-shadow:0 8px 24px oklch(0.1 0.01 200/0.1) !important; transition:transform 0.4s cubic-bezier(0.16,1,0.3,1), box-shadow 0.4s ease, border-color 0.3s ease !important; overflow:hidden; }
    .chart-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg, transparent 5%, oklch(from var(--pr) l c h / 0.4) 50%, transparent 95%); }
    .chart-card:hover { transform:translateY(-4px) scale(1.01) !important; box-shadow:0 16px 40px oklch(0.1 0.02 200/0.16), var(--glow-pr) !important; border-color:oklch(from var(--pr) l c h / 0.38) !important; }

    .prog-wrap { box-shadow:inset 0 1px 3px oklch(0 0 0 / 0.15) !important; }
    .prog-bar { background:linear-gradient(90deg, var(--pr), oklch(from var(--pr) calc(l + 0.1) c calc(h + 20))) !important; box-shadow:0 0 8px oklch(from var(--pr) l c h / 0.5) !important; position:relative; }
    .prog-bar::after { content:''; position:absolute; top:0; left:0; right:0; height:50%; background:oklch(1 0 0 / 0.25); border-radius:var(--r-full); }

    .btn-sm { background:linear-gradient(135deg, var(--pr), var(--prh)) !important; box-shadow:0 4px 12px oklch(from var(--pr) l c h / 0.35), 0 1px 0 oklch(1 0 0 / 0.15) inset !important; transition:transform 0.2s cubic-bezier(0.16,1,0.3,1), box-shadow 0.2s ease !important; position:relative; overflow:hidden; }
    .btn-sm::before { content:''; position:absolute; top:0; left:-100%; width:60%; height:100%; background:linear-gradient(90deg, transparent, oklch(1 0 0 / 0.15), transparent); transform:skewX(-20deg); transition:left 0.4s ease; }
    .btn-sm:hover { transform:translateY(-2px) !important; box-shadow:0 8px 20px oklch(from var(--pr) l c h / 0.45) !important; }
    .btn-sm:hover::before { left:150%; }
    .btn-sm:active { transform:translateY(0) !important; }
    .btn-sm.ghost { background:transparent !important; box-shadow:none !important; }

    .sidebar { border-right:1px solid oklch(from var(--pr) l c h / 0.15) !important; box-shadow:4px 0 32px oklch(from var(--pr) l c h / 0.07) !important; position:relative; z-index:20; }
    .sidebar::before { content:''; position:absolute; top:0; right:0; width:1px; height:100%; background:linear-gradient(180deg, transparent, oklch(from var(--pr) l c h / 0.4), transparent); pointer-events:none; }
    .sb-item:hover { box-shadow:inset 3px 0 0 oklch(from var(--pr) l c h / 0.4) !important; }
    .sb-item.active { background:oklch(from var(--pr) l c h / 0.08) !important; box-shadow:inset 3px 0 0 var(--pr), 0 0 12px oklch(from var(--pr) l c h / 0.1) !important; }
    .sb-logo svg { filter:drop-shadow(0 0 5px oklch(from var(--pr) l c h / 0.5)); }

    .topbar { border-bottom:1px solid oklch(from var(--pr) l c h / 0.12) !important; box-shadow:0 2px 20px oklch(from var(--pr) l c h / 0.06) !important; backdrop-filter:blur(12px); }
    .page-title { text-shadow:0 0 20px oklch(from var(--pr) l c h / 0.2); }
    .avatar { box-shadow:0 0 0 2px oklch(from var(--pr) l c h / 0.25), var(--glow-pr) !important; }
    .icon-btn:hover { background:oklch(from var(--pr) l c h / 0.08) !important; box-shadow:var(--glow-pr) !important; }
    .modal { border:1px solid oklch(from var(--pr) l c h / 0.2) !important; box-shadow:0 32px 80px oklch(0 0 0 / 0.35), var(--glow-pr) !important; }
    .toast { backdrop-filter:blur(12px); box-shadow:0 8px 24px oklch(0 0 0 / 0.2), var(--glow-pr) !important; }
    .cal-day { transition:transform 0.2s cubic-bezier(0.16,1,0.3,1), box-shadow 0.2s ease !important; }
    .cal-day:hover { transform:scale(1.03) !important; box-shadow:0 4px 12px oklch(from var(--pr) l c h / 0.2) !important; }
    .member-card, .member-row { transition:background 0.2s ease, box-shadow 0.2s ease !important; }
    .member-card:hover, .member-row:hover { background:oklch(from var(--pr) l c h / 0.04) !important; box-shadow:inset 3px 0 0 oklch(from var(--pr) l c h / 0.3) !important; }

    ::-webkit-scrollbar-thumb { background:linear-gradient(180deg, var(--pr), var(--prh)) !important; }
    tr:hover td { background:oklch(from var(--pr) l c h / 0.04) !important; }
    .content::before { content:''; position:fixed; inset:0; background-image:linear-gradient(oklch(from var(--pr) l c h / 0.025) 1px, transparent 1px), linear-gradient(90deg, oklch(from var(--pr) l c h / 0.025) 1px, transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; mask-image:radial-gradient(ellipse 80% 60% at 50% 50%, black 20%, transparent 80%); }
    .content > * { position:relative; z-index:1; }

    [data-theme="dark"] .kpi { background:linear-gradient(135deg, var(--surf) 0%, oklch(from var(--pr) 0.14 0.02 200) 100%) !important; }
    [data-theme="dark"] .chart-card { background:linear-gradient(135deg, var(--surf) 0%, oklch(from var(--pr) 0.14 0.02 200) 100%) !important; }

    /* Scroll Reveal */
    .fade-in-up { opacity:1; } .fade-in-left { opacity:1; } .fade-in-right { opacity:1; }
    @supports (animation-timeline: scroll()) {
      .fade-in-up    { opacity:0; clip-path:inset(0 0 8% 0); animation:reveal-up linear both; animation-timeline:view(); animation-range:entry 0% entry 85%; }
      .fade-in-left  { opacity:0; clip-path:inset(0 0 0 8%); animation:reveal-left linear both; animation-timeline:view(); animation-range:entry 0% entry 85%; }
      .fade-in-right { opacity:0; clip-path:inset(0 8% 0 0); animation:reveal-right linear both; animation-timeline:view(); animation-range:entry 0% entry 85%; }
    }
    @keyframes reveal-up    { to { opacity:1; clip-path:inset(0 0 0 0); } }
    @keyframes reveal-left  { to { opacity:1; clip-path:inset(0 0 0 0); } }
    @keyframes reveal-right { to { opacity:1; clip-path:inset(0 0 0 0); } }
    @media (prefers-reduced-motion: reduce) {
      .fade-in-up,.fade-in-left,.fade-in-right { animation:none !important; opacity:1 !important; clip-path:none !important; }
      .kpi,.chart-card { transition:none !important; }
    }

  <body x-data="managerApp()" @keydown.escape="modal = ''">

  <!-- ══ 3D Particle Network Background ══ -->
  <canvas id="bg-canvas"></canvas>
  <script>
  (function(){
    const canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');
    let W,H,P=[];
    function resize(){ W=canvas.width=innerWidth; H=canvas.height=innerHeight; }
    function accent(){ return document.documentElement.getAttribute('data-theme')==='dark'?'rgba(79,152,163,':'rgba(1,105,111,'; }
    function init(){ P=[]; const n=Math.min(50,Math.floor(W*H/28000)); for(let i=0;i<n;i++) P.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2+.5,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1,p:Math.random()*Math.PI*2}); }
    function draw(){ ctx.clearRect(0,0,W,H); const a=accent(); P.forEach((p,i)=>{ p.p+=.02; const s=1+Math.sin(p.p)*.3; for(let j=i+1;j<P.length;j++){ const dx=p.x-P[j].x,dy=p.y-P[j].y,d=Math.sqrt(dx*dx+dy*dy); if(d<140){ ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(P[j].x,P[j].y);ctx.strokeStyle=a+(0.12*(1-d/140)).toFixed(3)+')';ctx.lineWidth=.6;ctx.stroke(); } } ctx.beginPath();ctx.arc(p.x,p.y,p.r*s,0,Math.PI*2);ctx.fillStyle=a+p.o+')';ctx.fill();ctx.beginPath();ctx.arc(p.x,p.y,p.r*s*3,0,Math.PI*2);ctx.fillStyle=a+(p.o*.12)+')';ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0; }); requestAnimationFrame(draw); }
    resize();init();draw();
    window.addEventListener('resize',()=>{ resize();init(); });
    document.addEventListener('mousemove',e=>{ document.querySelectorAll('.kpi').forEach(card=>{ const r=card.getBoundingClientRect(),dx=(e.clientX-(r.left+r.width/2))/(r.width*3),dy=(e.clientY-(r.top+r.height/2))/(r.height*3); if(Math.sqrt(dx*dx+dy*dy)<1) card.style.transform=`perspective(600px) rotateX(${-dy*12}deg) rotateY(${dx*12}deg) translateZ(8px)`; else card.style.transform=''; }); });
  })();
  </script>

                    </div>
                    <template x-for="r in emp.records" :key="r.date">
                      <div style="display:grid;grid-template-columns:1.4fr 90px 90px 90px 80px;gap:var(--sp3);padding:var(--sp2) 0;border-bottom:1px solid var(--div);align-items:center;"
                           @mouseenter="$el.style.background='oklch(from var(--pr) l c h / 0.04)'"
                           @mouseleave="$el.style.background=''">
                        <div style="font-size:12px;font-weight:600;color:var(--txt);"
                             x-text="new Date(r.date).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})"></div>
                        <div>
                          <span class="badge"
                            :class="r.status==='present'?'badge-completed':(r.status==='late'?'badge-pending':(r.clock_in?'badge-inprogress':'badge-low'))"
                            x-text="r.status||'absent'"></span>
                        </div>
                        <div style="font-size:12px;font-weight:600;color:var(--pr);font-variant-numeric:tabular-nums;"
                             x-text="r.clock_in?new Date(r.clock_in).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}):'—'"></div>
                        <div style="font-size:12px;font-weight:600;color:var(--warn);font-variant-numeric:tabular-nums;"
                             x-text="r.clock_out?new Date(r.clock_out).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}):'—'"></div>
                        <div style="font-size:12px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums;text-align:right;"
                             x-text="r.clock_out?((new Date(r.clock_out)-new Date(r.clock_in))/3600000).toFixed(1)+'h':'—'"></div>
                      </div>
                    </template>
                    <div x-show="emp.records.length===0" style="padding:var(--sp4);text-align:center;color:var(--txtm);font-size:var(--text-sm);">
                      No logs found for selected timeframe.
                    </div>
                  </div>

                </div>
              </template>

              <!-- Empty state -->
              <div x-show="teamAttendance.length===0"
                   style="padding:var(--sp10);text-align:center;color:var(--txtm);font-size:var(--text-sm);">
                No team attendance data available for the selected timeframe.
              </div>

            </div>
          </div>
        </template>

        <!-- TEAM TAB -->
        <template x-if="tab==='team'">
            <div class="section fade-in-up" style="margin-bottom:var(--sp6)">
              <div class="section-head">
                <h2 x-text="team?.name ?? team?.team_name ?? 'My Team'"></h2>
                <button class="btn-sm ghost" @click="modal='renameTeam'">Rename</button>
              </div>
              <!-- Manager's Card -->
              <div class="member-card" style="border-left: 4px solid var(--pr); background: var(--prhi); margin-bottom:var(--sp4)">
                <div style="display:flex;align-items:center;gap:var(--sp3)">
                  <div class="avatar" x-text="team?.manager_name?.[0]??'?'" style="background:var(--pr);color:white"></div>
                  <div>
                    <div style="font-weight:600;font-size:var(--text-sm)" x-text="team?.manager_name"></div>
                    <div style="font-size:var(--text-xs);color:var(--txtm)" x-text="team?.manager_email"></div>
                  </div>
                </div>
                <div style="text-align:right">
                  <span class="badge badge-completed" style="font-size:var(--text-xs);padding:4px 12px">Manager</span>
                </div>
              </div>

              <template x-for="m in team?.members ?? []" :key="m.user_id">
                <div class="member-card">
                  <div style="display:flex;align-items:center;gap:var(--sp3)">
                    <div class="avatar" x-text="m.name?.[0]??'?'"></div>
                    <div>
                      <div style="font-weight:600;font-size:var(--text-sm)" x-text="m.name"></div>
                      <div style="font-size:var(--text-xs);color:var(--txtm)" x-text="m.email"></div>
                    </div>
                  </div>
                  <div style="text-align:right">
                    <div style="font-size:var(--text-xs);color:var(--txtm)" x-text="`${m.completed_tasks??0}/${m.total_tasks??0} tasks done`"></div>
                    <div style="margin-top:var(--sp1);min-width:100px">
                      <div class="prog-wrap">
                        <div class="prog-bar" :style="`width:${m.total_tasks > 0 ? Math.round((m.completed_tasks??0)/m.total_tasks*100) : 0}%`"></div>
                      </div>
                    </div>
                  </div>
                </div>
              </template>
              <div x-show="!team?.members?.length" style="padding:var(--sp10);text-align:center;color:var(--txtm)">No team members yet.</div>
            </div>
          </div>
        </template>

        <!-- QUERIES TAB -->
        <template x-if="tab==='queries'">
          <div>
            <div class="section fade-in-up">
              <div class="section-head">
                <h2>Employee Queries</h2>
                <span style="font-size:var(--text-xs);color:var(--txtm)" x-text="`${openQueryCount} open`"></span>
              </div>
              <div class="tbl-wrap">
                <table>
                  <thead>
                    <tr><th>From</th><th>Subject</th><th>Status</th><th>Date</th><th>Action</th></tr>
                  </thead>
                  <tbody>
                    <template x-for="q in queries" :key="q.id">
                      <tr>
                        <td x-text="q.from_name"></td>
                        <td x-text="q.subject"></td>
                        <td><span class="badge" :class="q.is_answered ? 'badge-resolved' : 'badge-open'" x-text="q.is_answered ? 'Resolved' : 'Open'"></span></td>
                        <td x-text="q.created_at?.substring(0,10)"></td>
                        <td><button class="btn-sm ghost" @click="openReply(q)" x-text="q.is_answered ? 'View' : 'Reply'"></button></td>
                      </tr>
                    </template>
                    <tr x-show="queries.length === 0">
                      <td colspan="5" style="text-align:center;color:var(--txtm);padding:var(--sp10)">No queries received yet.</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </template>

        <!-- INSIGHTS TAB -->
        <template x-if="tab==='insights'"><div>
          <div class="chart-grid">
            <div class="chart-card fade-in-left">
              <div class="chart-title">Team Performance</div>
              <canvas id="teamChart" height="250"></canvas>
            </div>
            <div class="chart-card fade-in-right">
              <div class="chart-title">Member Stats</div>
              <template x-for="m in insights" :key="m.name">
                <div style="margin-bottom:var(--sp4)">
                  <div style="display:flex;justify-content:space-between;font-size:var(--text-sm);margin-bottom:var(--sp1)">
                    <span x-text="m.name"></span>
                    <span style="color:var(--pr);font-weight:700" x-text="(m.completion_pct ?? 0) + '%'"></span>
                  </div>
                  <div class="prog-wrap">
                    <div class="prog-bar" :style="`width:${m.completion_pct ?? 0}%`"></div>
                  </div>
                  <div style="font-size:11px;color:var(--txtm);margin-top:var(--sp1)" x-text="`${m.completed??0} completed · ${m.in_progress??0} in progress · ${m.pending??0} pending`"></div>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>
        <!-- END INSIGHTS TAB -->

        <!-- CALENDAR TAB -->
        <template x-if="tab==='calendar'"><div>
          <div class="section">
            <div class="section-head">
              <div class="cal-header" style="width:100%">
                <div class="cal-title" x-text="calMonthNames[calMonth] + ' ' + calYear"></div>
                <div class="cal-nav">
                  <button @click="prevMonth()" title="Previous month"><i data-lucide="chevron-left" style="width:14px;height:14px"></i></button>
                  <button @click="initCalendar()" title="Today" style="width:auto;padding:0 8px;font-size:11px;font-weight:700">Today</button>
                  <button @click="nextMonth()" title="Next month"><i data-lucide="chevron-right" style="width:14px;height:14px"></i></button>
                </div>
              </div>
            </div>
            <div style="padding:var(--sp5)">
              <div class="cal-weekdays">
                <template x-for="d in ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']" :key="d">
                  <div class="cal-weekday" x-text="d"></div>
                </template>
              </div>
              <div class="cal-grid">
                <template x-for="day in calDays" :key="day.key">
                  <div class="cal-day" :class="{ today: day.isToday, 'other-month': !day.inMonth }">
                    <div class="cal-day-num" x-text="day.d"></div>
                    <div class="cal-events">
                      <template x-for="ev in day.events" :key="ev.id">
                        <div class="cal-event" :class="ev.type" x-text="ev.label"></div>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>
          <div style="display:flex;gap:var(--sp5);padding:var(--sp4) 0;flex-wrap:wrap">
            <div style="display:flex;align-items:center;gap:var(--sp2);font-size:var(--text-xs);color:var(--txtm)">
              <span class="cal-dot" style="background:var(--pr)"></span> Project Deadline
            </div>
            <div style="display:flex;align-items:center;gap:var(--sp2);font-size:var(--text-xs);color:var(--txtm)">
              <span class="cal-dot" style="background:var(--warn)"></span> Task Due Date
            </div>
            <div style="display:flex;align-items:center;gap:var(--sp2);font-size:var(--text-xs);color:var(--txtm)">
              <span class="cal-dot" style="background:var(--err)"></span> Overdue
            </div>
          </div>
        </div>
      </template>
        <!-- END CALENDAR TAB -->

      </div>
      <!-- end .content -->
    </main>

    <!-- CREATE TASK MODAL -->
    <div class="modal-bg" x-show="modal==='createTask'" x-cloak @click.self="modal=''">
      <div class="modal">
        <h3>Create Task</h3>
        <div class="field"><label>Task Name</label><input type="text" x-model="newTask.title" placeholder="e.g. Build Login Page UI" /></div>
        <div class="field"><label>Description</label><textarea x-model="newTask.description" rows="3"></textarea></div>
        <div class="field">
          <label>Project</label>
          <select x-model="newTask.project_id">
            <option value="">Select project...</option>
            <template x-for="p in projects" :key="p.project_id">
              <option :value="p.project_id" x-text="p.name"></option>
            </template>
          </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp4)">
          <div class="field">
            <label>Priority</label>
            <select x-model="newTask.priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
              <option value="critical">Critical</option>
            </select>
          </div>
          <div class="field"><label>Due Date</label><input type="date" x-model="newTask.due_date" :max="newTask.project_id && projects.find(p => p.project_id == newTask.project_id)?.end_date ? fmtDate(projects.find(p => p.project_id == newTask.project_id).end_date) : ''" /></div>
        </div>
        <div class="modal-btns">
          <button class="btn-sm ghost" @click="modal=''">Cancel</button>
          <button class="btn-sm" @click="createTask()">Create Task</button>
        </div>
      </div>
    </div>

    <!-- ASSIGN TASK MODAL -->
    <div class="modal-bg" x-show="modal==='assignTask'" x-cloak @click.self="modal=''">
      <div class="modal">
        <h3>Assign Task</h3>
        <p style="font-size:var(--text-sm);color:var(--txtm);margin-bottom:var(--sp5)" x-text="'Task: ' + selectedTask?.name"></p>
        <div class="field">
          <label>Assign To</label>
          <select x-model="assignUserId">
            <option value="">Select employee...</option>
            <template x-for="m in (team?.members ?? []).filter(u => u.role === 'employee')" :key="m.user_id">
              <option :value="m.user_id" x-text="m.name"></option>
            </template>
          </select>
        </div>
        <div class="modal-btns">
          <button class="btn-sm ghost" @click="modal=''">Cancel</button>
          <button class="btn-sm" @click="assignTask()">Assign</button>
        </div>
      </div>
    </div>

    <div class="modal-bg" x-show="modal==='replyQuery'" x-cloak @click.self="modal=''">
      <div class="modal">
        <h3 x-text="selectedQuery?.is_answered ? 'Query Details' : 'Reply to Query'"></h3>
        <div style="background:var(--surfoff);border-radius:var(--r-lg);padding:var(--sp4);margin-bottom:var(--sp5)">
          <div style="font-weight:600;font-size:var(--text-sm)" x-text="selectedQuery?.subject"></div>
          <div style="font-size:var(--text-sm);color:var(--txtm);margin-top:var(--sp2)" x-text="selectedQuery?.message"></div>
        </div>
        <div class="field">
          <label x-text="selectedQuery?.is_answered ? 'Manager Reply' : 'Your Reply'"></label>
          <textarea x-model="replyText" rows="4" :readonly="selectedQuery?.is_answered" :placeholder="selectedQuery?.is_answered ? '' : 'Type your reply here...'"></textarea>
        </div>
        <div class="modal-btns">
          <button class="btn-sm ghost" @click="modal=''">Close</button>
          <button class="btn-sm" x-show="!selectedQuery?.is_answered" @click="submitReply()">Send Reply</button>
        </div>
      </div>
    </div>

    <!-- RENAME TEAM MODAL -->
    <div class="modal-bg" x-show="modal==='renameTeam'" x-cloak @click.self="modal=''">
      <div class="modal">
        <h3>Rename Team</h3>
        <div class="field"><label>New Team Name</label><input type="text" x-model="newTeamName" :placeholder="team?.name ?? 'Team name'" /></div>
        <div class="modal-btns">
          <button class="btn-sm ghost" @click="modal=''">Cancel</button>
          <button class="btn-sm" @click="renameTeam()">Save</button>
        </div>
      </div>
    </div>

    <!-- TOASTS -->
    <div class="toast-wrap">
      <template x-for="t in toasts" :key="t.id">
        <div class="toast" :class="t.type" x-text="t.msg"></div>
      </template>
    </div>

    <script>
      const API = 'http://localhost:3000';
      function getToken() { return localStorage.getItem('token'); }
      function getUser() { try { return JSON.parse(localStorage.getItem('user')); } catch { return null; } }

      async function api(path, opts = {}) {
        const res = await fetch(API + path, {
          ...opts,
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken(), ...(opts.headers || {}) }
        });
        const data = await res.json();
        if (res.status === 401) { location.href = '../login.html'; }
        return data;
      }

      function fmtDate(dateStr) {
        if (!dateStr) return '';
        return dateStr.substring(0, 10);
      }

      function managerApp() {
        return {
          tab: 'dashboard',
          user: getUser(),
          tasks: [],
          projects: [],
          team: null,
          queries: [],
          insights: [],
          modal: '',
          toasts: [],
          newTask: { title: '', description: '', project_id: '', priority: 'medium', due_date: '' },
          selectedTask: null,
          assignUserId: '',
          selectedQuery: null,
          replyText: '',
          newTeamName: '',
          _charts: {},

          attendanceToday: null,
          attendanceHistory: [],
          teamAttendance: [],
          attendancePeriod: 'today',
          expandedUsers: [],
          checkingIn: false,
          checkingOut: false,
          calDays: [],
          calMonth: new Date().getMonth(),
          calYear: new Date().getFullYear(),
          calMonthNames: ['January','February','March','April','May','June','July','August','September','October','November','December'],

          get pageTitle() {
            const map = { dashboard: 'Dashboard', tasks: 'Tasks', projects: 'Projects', team: 'My Team', queries: 'Queries', insights: 'Insights', attendance: 'Attendance', calendar: 'Calendar' };
            return map[this.tab] || 'Dashboard';
          },

          get groupedTeamAttendance() {
            const groups = {};
            this.teamAttendance.forEach(log => {
              if (!groups[log.user_id]) {
                groups[log.user_id] = {
                  user_id: log.user_id,
                  name: log.name,
                  email: log.email,
                  records: []
                };
              }
              if (log.date) {
                 groups[log.user_id].records.push({
                   date: log.date,
                   status: log.status,
                   clock_in: log.clock_in,
                   clock_out: log.clock_out
                 });
              }
            });
            return Object.values(groups);
          },

          get openQueryCount() { return this.queries.filter(q => !q.is_answered).length; },

          async init() {
            if (!getToken()) { location.href = '../login.html'; return; }
            await this.loadAll();
            this.$nextTick(() => {
              lucide.createIcons();
              this.renderCharts();
            });
          },

          async markCheckIn() {
            this.checkingIn = true;
            try {
              const res = await api('/api/manager/attendance/check-in', { method: 'POST' });
              if (res.success) {
                this.toast('Checked in successfully!', 'success', {
                  label: 'Undo',
                  onClick: async (id) => {
                    this.toasts = this.toasts.filter(t => t.id !== id);
                    const ur = await api('/api/manager/attendance/today', { method: 'DELETE' });
                    if(ur.success) { this.toast('Undo successful','success'); this.loadAll(); }
                  }
                });
                await this.loadAll();
              } else {
                this.toast(res.error || 'Failed to check in', 'error');
              }
            } catch { this.toast('Network error.', 'error'); }
            this.checkingIn = false;
          },

          async markCheckOut() {
            this.checkingOut = true;
            try {
              const res = await api('/api/manager/attendance/check-out', { method: 'PUT' });
              if (res.success) {
                this.toast('Checked out successfully!', 'success', {
                  label: 'Undo',
                  onClick: async (id) => {
                    this.toasts = this.toasts.filter(t => t.id !== id);
                    const ur = await api('/api/manager/attendance/undo-check-out', { method: 'PUT' });
                    if(ur.success) { this.toast('Undo successful','success'); this.loadAll(); }
                  }
                });
                await this.loadAll();
              } else {
                this.toast(res.error || 'Failed to check out', 'error');
              }
            } catch { this.toast('Network error.', 'error'); }
            this.checkingOut = false;
          },

          formatDate(d) {
            if (!d) return '--';
            return new Date(d).toLocaleDateString();
          },

          async loadAll() {
            const [tasksRes, projectsRes, teamRes, queriesRes, insightsRes, attRes, attHistRes] = await Promise.all([
              api('/api/manager/tasks'),
              api('/api/manager/projects'),
              api('/api/manager/team'),
              api('/api/manager/queries'),
              api('/api/manager/insights'),
              api('/api/manager/attendance/today'),
              api('/api/manager/attendance/history')
            ]);
            await this.fetchTeamAttendance();
            this.tasks    = tasksRes.data    || [];
            this.projects = projectsRes.data || [];
            this.team     = teamRes.data     || null;
            this.queries  = queriesRes.data  || [];
            this.insights = insightsRes.data || [];
            this.attendanceToday = attRes.data || null;
            this.attendanceHistory = attHistRes.data || [];
            this.buildCalendar();
          },

          async fetchTeamAttendance() {
            const att = await api(`/api/manager/team/attendance?period=${this.attendancePeriod}`);
            this.teamAttendance = att.data || [];
          },

          // ✅ FIXED: destroy old charts before re-rendering
          renderCharts() {
            ['mgTaskChart', 'teamChart'].forEach(id => {
              const c = Chart.getChart(id);
              if (c) c.destroy();
            });

            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
            const textColor = isDark ? '#797876' : '#7a7974';

            // Task Status Chart (dashboard)
            const taskCtx = document.getElementById('mgTaskChart');
            if (taskCtx) {
              const completed  = this.tasks.filter(t => t.status === 'completed').length;
              const in_progress = this.tasks.filter(t => t.status === 'in_progress').length;
              const pending    = this.tasks.filter(t => t.status === 'pending').length;
              new Chart(taskCtx, {
                type: 'doughnut',
                data: {
                  labels: ['Completed', 'In Progress', 'Pending'],
                  datasets: [{ data: [completed, in_progress, pending], backgroundColor: ['#437a22', '#01696f', '#964219'], borderWidth: 0 }]
                },
                options: {
                  responsive: true,
                  plugins: { legend: { position: 'bottom', labels: { color: textColor, padding: 16, font: { size: 12 } } } },
                  cutout: '70%'
                }
              });
            }

            // Team Performance Chart (insights)
            const teamCtx = document.getElementById('teamChart');
            if (teamCtx && this.insights.length > 0) {
              new Chart(teamCtx, {
                type: 'bar',
                data: {
                  labels: this.insights.map(m => m.name),
                  datasets: [
                    { label: 'Completed', data: this.insights.map(m => m.completed ?? 0), backgroundColor: '#437a22', borderRadius: 4, borderWidth: 0 },
                    { label: 'In Progress', data: this.insights.map(m => m.in_progress ?? 0), backgroundColor: '#01696f', borderRadius: 4, borderWidth: 0 },
                    { label: 'Pending', data: this.insights.map(m => m.pending ?? 0), backgroundColor: '#964219', borderRadius: 4, borderWidth: 0 },
                  ]
                },
                options: {
                  responsive: true,
                  plugins: { legend: { position: 'bottom', labels: { color: textColor, padding: 16, font: { size: 12 } } } },
                  scales: {
                    x: { stacked: true, grid: { color: gridColor }, ticks: { color: textColor } },
                    y: { stacked: true, grid: { color: gridColor }, ticks: { color: textColor, stepSize: 1 } }
                  }
                }
              });
            }
          },

          openAssign(task) {
            this.selectedTask = task;
            this.assignUserId = '';
            this.modal = 'assignTask';
            this.$nextTick(() => lucide.createIcons());
          },

          async createTask() {
            if (!this.newTask.title) { this.toast('Task name is required', 'error'); return; }
            const res = await api('/api/manager/tasks', { method: 'POST', body: JSON.stringify(this.newTask) });
            if (res.success) {
              this.toast('Task created!', 'success');
              this.modal = '';
              this.newTask = { title: '', description: '', project_id: '', priority: 'medium', due_date: '' };
              await this.loadAll();
            } else { this.toast(res.error || 'Failed to create task', 'error'); }
          },

          async assignTask() {
            if (!this.assignUserId) { this.toast('Select an employee', 'error'); return; }
            const res = await api(`/api/manager/tasks/${this.selectedTask.task_id}/assign`, {
              method: 'PUT', body: JSON.stringify({ assigned_to: this.assignUserId })
            });
            if (res.success) {
              this.toast('Task assigned!', 'success');
              this.modal = '';
              await this.loadAll();
            } else { this.toast(res.error || 'Failed to assign task', 'error'); }
          },

          async deleteTask(taskId) {
            if (!confirm('Delete this task? This cannot be undone.')) return;
            const res = await api(`/api/manager/tasks/${taskId}`, { method: 'DELETE' });
            if (res.success) { this.toast('Task deleted', 'success'); await this.loadAll(); }
            else { this.toast(res.error || 'Failed to delete task', 'error'); }
          },

          openReply(query) {
            this.selectedQuery = query;
            this.replyText = query.is_answered ? query.reply : '';
            this.modal = 'replyQuery';
            this.$nextTick(() => lucide.createIcons());
          },

          async submitReply() {
            if (!this.replyText.trim()) { this.toast('Reply cannot be empty', 'error'); return; }
            const res = await api(`/api/manager/queries/${this.selectedQuery.id}/reply`, {
              method: 'PUT', body: JSON.stringify({ reply: this.replyText })
            });
            if (res.success) {
              this.toast('Reply sent!', 'success');
              this.modal = '';
              await this.loadAll();
            } else { this.toast(res.error || 'Failed to send reply', 'error'); }
          },

          async renameTeam() {
            if (!this.newTeamName.trim()) { this.toast('Team name is required', 'error'); return; }
            const res = await api(`/api/manager/team/rename`, {
              method: 'PUT', body: JSON.stringify({ name: this.newTeamName })
            });
            if (res.success) {
              this.toast('Team renamed!', 'success');
              this.modal = '';
              await this.loadAll();
            } else { this.toast(res.error || 'Failed to rename team', 'error'); }
          },

          logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            location.href = '../login.html';
          },

          initCalendar() {
            const now = new Date();
            this.calMonth = now.getMonth();
            this.calYear = now.getFullYear();
            this.buildCalendar();
          },
          prevMonth() {
            if (this.calMonth === 0) { this.calMonth = 11; this.calYear--; } else this.calMonth--;
            this.buildCalendar();
          },
          nextMonth() {
            if (this.calMonth === 11) { this.calMonth = 0; this.calYear++; } else this.calMonth++;
            this.buildCalendar();
          },
          buildCalendar() {
            const today = new Date();
            const firstDay = new Date(this.calYear, this.calMonth, 1).getDay();
            const daysInMonth = new Date(this.calYear, this.calMonth + 1, 0).getDate();
            const daysInPrev = new Date(this.calYear, this.calMonth, 0).getDate();
            const days = [];
            const events = [];
            (this.tasks || []).forEach((t, i) => {
              if (t.due_date) {
                const d = new Date(t.due_date);
                const isPast = d < today && t.status !== 'completed';
                events.push({ date: d, id: 't'+i, label: (isPast ? '🚨 ' : '⚠️ ') + (t.name || t.title), type: isPast ? 'deadline' : 'task' });
              }
            });
            (this.projects || []).forEach((p, i) => {
              if (p.estimated_end_date) {
                const d = new Date(p.estimated_end_date);
                events.push({ date: d, id: 'pr'+i, label: '🏁 ' + (p.name || p.project_name), type: 'project' });
              }
            });
            for (let i = 0; i < firstDay; i++) {
              const d = daysInPrev - firstDay + 1 + i;
              days.push({ d, inMonth: false, isToday: false, key: 'prev-'+d, events: [] });
            }
            for (let d = 1; d <= daysInMonth; d++) {
              const isToday = today.getFullYear() === this.calYear && today.getMonth() === this.calMonth && today.getDate() === d;
              const dayEvents = events.filter(ev => { const ed = new Date(ev.date); return ed.getFullYear() === this.calYear && ed.getMonth() === this.calMonth && ed.getDate() === d; });
              days.push({ d, inMonth: true, isToday, key: 'cur-'+d, events: dayEvents });
            }
            const remainder = days.length % 7 === 0 ? 0 : 7 - (days.length % 7);
            for (let i = 1; i <= remainder; i++) days.push({ d: i, inMonth: false, isToday: false, key: 'next-'+i, events: [] });
            this.calDays = days;
            this.$nextTick(() => lucide.createIcons());
          },

          toast(msg, type = 'success') {
            const id = Date.now();
            this.toasts.push({ id, msg, type });
            setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 3500);
          }
        };
      }

      // Theme toggle
      (function() {
        const t = document.querySelector('[data-theme-toggle]');
        const r = document.documentElement;
        let d = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        r.setAttribute('data-theme', d);
        if (t) t.addEventListener('click', () => {
          d = d === 'dark' ? 'light' : 'dark';
          r.setAttribute('data-theme', d);
          localStorage.setItem('theme', d);
          lucide.createIcons();
        });
      })();

      lucide.createIcons();
    </script>
  </body>
</html>
