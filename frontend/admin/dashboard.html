<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard — WorkHive</title>
    <link
      href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --font-display: "Cabinet Grotesk", sans-serif;
        --font-body: "Inter", sans-serif;
        --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
        --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
        --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
        --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
        --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
        --sp1: 0.25rem;
        --sp2: 0.5rem;
        --sp3: 0.75rem;
        --sp4: 1rem;
        --sp5: 1.25rem;
        --sp6: 1.5rem;
        --sp8: 2rem;
        --sp10: 2.5rem;
        --sp12: 3rem;
        --sp16: 4rem;
        --r-sm: 0.375rem;
        --r-md: 0.5rem;
        --r-lg: 0.75rem;
        --r-xl: 1rem;
        --r-full: 9999px;
        --tr: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      :root,
      [data-theme="light"] {
        --bg: #f7f6f2;
        --surf: #f9f8f5;
        --surf2: #fbfbf9;
        --surfoff: #f3f0ec;
        --div: #dcd9d5;
        --bdr: #d4d1ca;
        --txt: #28251d;
        --txtm: #7a7974;
        --txtf: #bab9b4;
        --txti: #f9f8f4;
        --pr: #01696f;
        --prh: #0c4e54;
        --prhi: #cedcd8;
        --err: #a12c7b;
        --suc: #437a22;
        --warn: #964219;
        --shsm: 0 1px 2px oklch(0.2 0.01 80/0.06);
        --shmd: 0 4px 12px oklch(0.2 0.01 80/0.08);
        --shlg: 0 12px 32px oklch(0.2 0.01 80/0.12);
      }
      [data-theme="dark"] {
        --bg: #171614;
        --surf: #1c1b19;
        --surf2: #201f1d;
        --surfoff: #1d1c1a;
        --div: #262523;
        --bdr: #393836;
        --txt: #cdccca;
        --txtm: #797876;
        --txtf: #5a5957;
        --txti: #2b2a28;
        --pr: #4f98a3;
        --prh: #227f8b;
        --prhi: #313b3b;
        --err: #d163a7;
        --suc: #6daa45;
        --warn: #bb653b;
        --shsm: 0 1px 2px oklch(0 0 0/0.2);
        --shmd: 0 4px 12px oklch(0 0 0/0.3);
        --shlg: 0 12px 32px oklch(0 0 0/0.4);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        -webkit-font-smoothing: antialiased;
      }
      body {
        font-family: var(--font-body);
        font-size: var(--text-sm);
        color: var(--txt);
        background: var(--bg);
        display: flex;
        height: 100dvh;
        overflow: hidden;
      }
      h1,
      h2,
      h3,
      h4 {
        font-family: var(--font-display);
        line-height: 1.2;
      }
      button,
      a {
        transition:
          color var(--tr),
          background var(--tr),
          border-color var(--tr);
        cursor: pointer;
      }
      button {
        border: none;
        background: none;
        font: inherit;
        color: inherit;
      }
      /* ── Sidebar ── */
      .sidebar {
        width: 240px;
        min-width: 240px;
        background: var(--surf);
        border-right: 1px solid var(--div);
        display: flex;
        flex-direction: column;
        height: 100dvh;
        position: sticky;
        top: 0;
        overflow-y: auto;
        flex-shrink: 0;
      }
      .sb-logo {
        display: flex;
        align-items: center;
        gap: var(--sp2);
        padding: var(--sp6) var(--sp5);
        font-family: var(--font-display);
        font-weight: 800;
        font-size: var(--text-base);
        color: var(--txt);
        text-decoration: none;
        border-bottom: 1px solid var(--div);
      }
      #sub-banner {
        position: fixed; /* sticks to top */
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
      }

      /* Push everything below it */
      .admin-layout,
      .main-content,
      main {
        padding-top: 56px; /* matches banner height */
      }
      .sb-section {
        padding: var(--sp4) var(--sp3);
        font-size: var(--text-xs);
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--txtf);
        margin-top: var(--sp4);
      }
      .sb-item {
        display: flex;
        align-items: center;
        gap: var(--sp3);
        padding: var(--sp2) var(--sp4);
        border-radius: var(--r-lg);
        margin: 0 var(--sp2);
        font-size: var(--text-sm);
        color: var(--txtm);
        text-decoration: none;
        cursor: pointer;
      }
      .sb-item:hover,
      .sb-item.active {
        background: var(--surfoff);
        color: var(--txt);
      }
      .sb-item.active {
        color: var(--pr);
        font-weight: 600;
      }
      .sb-item svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
      .sb-bottom {
        margin-top: auto;
        padding: var(--sp4);
        border-top: 1px solid var(--div);
      }
      .sb-user {
        display: flex;
        align-items: center;
        gap: var(--sp3);
      }
      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--prhi);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: var(--text-xs);
        font-weight: 700;
        color: var(--pr);
        flex-shrink: 0;
      }
      .user-name {
        font-size: var(--text-sm);
        font-weight: 600;
        color: var(--txt);
      }
      .user-role {
        font-size: var(--text-xs);
        color: var(--txtm);
        text-transform: capitalize;
      }
      /* ── Main area ── */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-width: 0;
        min-height: 0;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--sp4) var(--sp8);
        border-bottom: 1px solid var(--div);
        background: var(--surf);
        position: sticky;
        top: 0;
        z-index: 10;
        flex-shrink: 0;
      }
      .page-title {
        font-size: var(--text-lg);
        font-weight: 800;
        color: var(--txt);
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: var(--sp3);
      }
      .icon-btn {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--r-md);
        border: 1px solid var(--bdr);
        color: var(--txtm);
      }
      .icon-btn:hover {
        background: var(--surfoff);
      }
      .notif-dot {
        position: relative;
      }
      .notif-dot::after {
        content: "";
        position: absolute;
        top: 6px;
        right: 6px;
        width: 7px;
        height: 7px;
        background: var(--err);
        border-radius: 50%;
        border: 2px solid var(--surf);
      }
      .content {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: var(--sp8);
      }
      /* ── KPI cards ── */
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(min(200px, 100%), 1fr));
        gap: var(--sp5);
        margin-bottom: var(--sp8);
      }
      .kpi {
        background: var(--surf);
        border: 1px solid var(--bdr);
        border-radius: var(--r-xl);
        padding: var(--sp6);
      }
      .kpi-label {
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--txtm);
        margin-bottom: var(--sp2);
      }
      .kpi-val {
        font-size: var(--text-xl);
        font-weight: 800;
        font-family: var(--font-display);
        color: var(--txt);
        font-variant-numeric: tabular-nums;
      }
      .kpi-sub {
        font-size: var(--text-xs);
        color: var(--txtm);
        margin-top: var(--sp1);
      }
      .kpi-sub.up {
        color: var(--suc);
      }
      .kpi-sub.down {
        color: var(--err);
      }
      /* ── Sections ── */
      .section {
        background: var(--surf);
        border: 1px solid var(--bdr);
        border-radius: var(--r-xl);
        margin-bottom: var(--sp6);
      }
      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--sp5) var(--sp6);
        border-bottom: 1px solid var(--div);
      }
      .section-head h2 {
        font-size: var(--text-base);
        font-weight: 700;
        color: var(--txt);
      }
      .btn-sm {
        padding: var(--sp1) var(--sp4);
        font-size: var(--text-xs);
        font-weight: 600;
        border-radius: var(--r-md);
        background: var(--pr);
        color: var(--txti);
        border: none;
        cursor: pointer;
      }
      .btn-sm:hover {
        background: var(--prh);
      }
      .btn-sm.ghost {
        background: transparent;
        color: var(--txtm);
        border: 1px solid var(--bdr);
      }
      .btn-sm.ghost:hover {
        background: var(--surfoff);
        color: var(--txt);
      }
      /* ── Table ── */
      .tbl-wrap {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        padding: var(--sp3) var(--sp4);
        text-align: left;
        font-size: var(--text-xs);
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--txtm);
        border-bottom: 1px solid var(--div);
      }
      td {
        padding: var(--sp3) var(--sp4);
        font-size: var(--text-sm);
        color: var(--txt);
        border-bottom: 1px solid var(--div);
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: var(--surfoff);
      }
      /* ── Badges ── */
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: var(--r-full);
        font-size: 11px;
        font-weight: 600;
        white-space: nowrap;
      }
      .badge-active {
        background: oklch(from var(--suc) l c h/.15);
        color: var(--suc);
      }
      .badge-pending {
        background: oklch(from var(--warn) l c h/.15);
        color: var(--warn);
      }
      .badge-completed {
        background: oklch(from var(--pr) l c h/.15);
        color: var(--pr);
      }
      .badge-on_hold {
        background: oklch(from var(--txtm) l c h/.15);
        color: var(--txtm);
      }
      .badge-high {
        background: oklch(from var(--err) l c h/.12);
        color: var(--err);
      }
      .badge-critical {
        background: oklch(from var(--err) l c h/.2);
        color: var(--err);
      }
      .badge-medium {
        background: oklch(from var(--warn) l c h/.12);
        color: var(--warn);
      }
      .badge-low {
        background: oklch(from var(--txtm) l c h/.12);
        color: var(--txtm);
      }
      .badge-admin {
        background: oklch(from var(--pr) l c h/.15);
        color: var(--pr);
      }
      .badge-manager {
        background: oklch(from var(--warn) l c h/.15);
        color: var(--warn);
      }
      .badge-employee {
        background: oklch(from var(--txtm) l c h/.1);
        color: var(--txtm);
      }
      /* ── Chart area ── */
      .chart-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--sp6);
        margin-bottom: var(--sp6);
      }
      .chart-card {
        background: var(--surf);
        border: 1px solid var(--bdr);
        border-radius: var(--r-xl);
        padding: var(--sp6);
      }
      .chart-title {
        font-size: var(--text-sm);
        font-weight: 700;
        margin-bottom: var(--sp5);
        color: var(--txt);
      }
      /* ── Modal ── */
      .modal-bg {
        position: fixed;
        inset: 0;
        background: oklch(0 0 0/0.45);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--sp4);
      }
      .modal {
        background: var(--surf);
        border-radius: var(--r-xl);
        padding: var(--sp8);
        width: 100%;
        max-width: 480px;
        box-shadow: var(--shlg);
        max-height: 90dvh;
        overflow-y: auto;
      }
      .modal h3 {
        font-size: var(--text-lg);
        font-weight: 800;
        margin-bottom: var(--sp6);
      }
      .field {
        margin-bottom: var(--sp4);
      }
      .field label {
        display: block;
        font-size: var(--text-xs);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--txtm);
        margin-bottom: var(--sp1);
      }
      .field input,
      .field select,
      .field textarea {
        width: 100%;
        padding: var(--sp2) var(--sp3);
        border: 1px solid var(--bdr);
        border-radius: var(--r-md);
        background: var(--surf2);
        color: var(--txt);
        font-size: var(--text-sm);
        font-family: var(--font-body);
      }
      .field input:focus,
      .field select:focus,
      .field textarea:focus {
        outline: 2px solid var(--pr);
        outline-offset: 1px;
      }
      .modal-btns {
        display: flex;
        gap: var(--sp3);
        justify-content: flex-end;
        margin-top: var(--sp6);
      }
      /* ── Progress bar ── */
      .prog-wrap {
        background: var(--surfoff);
        border-radius: var(--r-full);
        height: 6px;
        overflow: hidden;
      }
      .prog-bar {
        height: 100%;
        background: var(--pr);
        border-radius: var(--r-full);
        transition: width 0.4s ease;
      }
      /* ── Tabs ── */
      .tabs {
        display: flex;
        gap: 0;
        border-bottom: 1px solid var(--div);
        margin-bottom: 0;
      }
      .tab {
        padding: var(--sp3) var(--sp5);
        font-size: var(--text-sm);
        font-weight: 500;
        color: var(--txtm);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
      }
      .tab.active {
        color: var(--pr);
        border-bottom-color: var(--pr);
        font-weight: 600;
      }
      /* ── Loading skeleton ── */
      @keyframes shimmer {
        0% {
          background-position: -200% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }
      .skeleton {
        background: linear-gradient(
          90deg,
          var(--surfoff) 25%,
          var(--surf2) 50%,
          var(--surfoff) 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s ease-in-out infinite;
        border-radius: var(--r-sm);
      }
      /* ── Toast ── */
      .toast-wrap {
        position: fixed;
        top: var(--sp6);
        right: var(--sp6);
        z-index: 200;
        display: flex;
        flex-direction: column;
        gap: var(--sp2);
      }
      .toast {
        background: var(--surf);
        border: 1px solid var(--bdr);
        border-radius: var(--r-lg);
        padding: var(--sp3) var(--sp5);
        font-size: var(--text-sm);
        box-shadow: var(--shmd);
        display: flex;
        align-items: center;
        gap: var(--sp2);
        min-width: 240px;
      }
      .toast.success {
        border-color: var(--suc);
        color: var(--suc);
      }
      .toast.error {
        border-color: var(--err);
        color: var(--err);
      }
      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
        .chart-grid {
          grid-template-columns: 1fr;
        }
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid var(--prhi);
        border-top-color: var(--pr);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
    </style>
  </head>
  <body x-data="adminApp()" @keydown.escape="closeModal()">
    <div id="sub-banner"></div>
    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
      <a href="#" class="sb-logo">
        <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
          <rect
            x="2"
            y="2"
            width="10"
            height="10"
            rx="2"
            fill="currentColor"
            opacity=".9"
          />
          <rect
            x="16"
            y="2"
            width="10"
            height="10"
            rx="2"
            fill="currentColor"
            opacity=".5"
          />
          <rect
            x="2"
            y="16"
            width="10"
            height="10"
            rx="2"
            fill="currentColor"
            opacity=".5"
          />
          <rect
            x="16"
            y="16"
            width="10"
            height="10"
            rx="2"
            fill="currentColor"
          />
        </svg>
        WorkHive
      </a>

      <div class="sb-section">Main</div>
      <a
        class="sb-item"
        :class="{active:tab==='dashboard'}"
        @click="tab='dashboard'"
        href="#"
      >
        <i data-lucide="layout-dashboard"></i> Dashboard
      </a>
      <a
        class="sb-item"
        :class="{active:tab==='projects'}"
        @click="tab='projects'"
        href="#"
      >
        <i data-lucide="folder"></i> Projects
      </a>
      <a
        class="sb-item"
        :class="{active:tab==='employees'}"
        @click="tab='employees'; loadAll(); $nextTick(()=>lucide.createIcons())"
        href="#"
      >
        <i data-lucide="users"></i> Employees
      </a>

      <a
        class="sb-item"
        :class="{active:tab==='teams'}"
        @click="tab='teams'; loadAll(); $nextTick(()=>lucide.createIcons())"
        href="#"
      >
        <i data-lucide="network"></i> Teams
      </a>

      <div class="sb-section">Analytics</div>
      <a
        class="sb-item"
        :class="{active:tab==='insights'}"
        @click="tab='insights'"
        href="#"
      >
        <i data-lucide="bar-chart-2"></i> Insights
      </a>
      <a
        class="sb-item"
        :class="{active:tab==='billing'}"
        @click="tab='billing'"
        href="#"
      >
        <i data-lucide="credit-card"></i> Subscription
      </a>

      <div class="sb-bottom">
        <a href="../shared/profile.html" style="text-decoration: none">
          <div class="sb-user">
            <div class="avatar" x-text="user?.name?.[0] ?? 'A'"></div>
            <div>
              <div class="user-name" x-text="user?.name ?? 'Admin'"></div>
              <div class="user-role">Admin</div>
            </div>
          </div>
        </a>
        <button
          @click="logout()"
          style="
            margin-top: var(--sp3);
            width: 100%;
            padding: var(--sp2);
            border-radius: var(--r-md);
            font-size: var(--text-xs);
            color: var(--txtm);
            border: 1px solid var(--bdr);
            display: flex;
            align-items: center;
            gap: var(--sp2);
          "
        >
          <i data-lucide="log-out" style="width: 14px; height: 14px"></i> Sign
          out
        </button>
      </div>
    </aside>

    <!-- ── MAIN ── -->
    <main class="main">
      <!-- Topbar -->
      <div class="topbar">
        <div style="display: flex; align-items: center; gap: var(--sp3)">
          <h1 class="page-title" x-text="pageTitle"></h1>
          <span
            style="
              font-size: var(--text-xs);
              font-weight: 600;
              background: var(--prhi);
              color: var(--pr);
              padding: 2px 10px;
              border-radius: var(--r-full);
              white-space: nowrap;
            "
            x-text="user?.org_name ?? ''"
          ></span>
        </div>
        <div class="topbar-right">
          <button class="icon-btn notif-dot" aria-label="Notifications">
            <i data-lucide="bell" style="width: 16px; height: 16px"></i>
          </button>
          <button class="icon-btn" data-theme-toggle aria-label="Toggle theme">
            <i data-lucide="sun" style="width: 16px; height: 16px"></i>
          </button>
        </div>
      </div>
      <div id="sub-banner" style="display: none"></div>

      <!-- Content -->
      <div class="content">
        <!-- ── DASHBOARD TAB ── -->
        <template x-if="tab==='dashboard'">
          <div>
            <div class="kpi-grid">

    <script src="../js/subscription-check.js"></script>
    <script>
      const API = "http://localhost:3000";
      function getToken() {
        return localStorage.getItem("token");
      }
      function getUser() {
        try {
          return JSON.parse(localStorage.getItem("user"));
        } catch {
          return null;
        }
      }
      async function api(path, opts = {}) {
        const res = await fetch(API + path, {
          ...opts,
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + getToken(),
            ...(opts.headers || {}),
          },
        });
        const data = await res.json();

        // Only logout on 401 (expired/invalid token) — NOT on 403 (forbidden/plan limit)
        if (res.status === 401) {
          location.href = "../login.html";
        }

        return data;
      }

      // Global date formatter — use everywhere dates are displayed
      function formatDate(dateStr) {
        if (!dateStr) return "—";
        const date = new Date(dateStr);
        if (isNaN(date.getTime())) return dateStr;
        return date.toLocaleDateString("en-IN", {
          day: "2-digit",
          month: "short",
          year: "numeric",
        });
        // Output: 31 May 2026
      }

      // Short version — just the date part from ISO strings
      function fmtDate(dateStr) {
        if (!dateStr) return "—";
        // Handle both '2026-05-31' and '2026-05-31T18:30:00.000Z'
        return dateStr.substring(0, 10);
        // Output: 2026-05-31
      }

      function adminApp() {
        return {
          tab: "dashboard",
          user: getUser(),
          stats: {},
          projects: [],
          employees: [],
          teams: [],
          topEmployees: [],
          subscription: null,
          billingHistory: [],
          modal: "",
          loading: false,
          toasts: [],
          newProject: {
            name: "",
            description: "",
            type: "",
            priority: "medium",
            estimated_end_date: "",
            newProject: {
              name: "",
              description: "",
              type: "",
              priority: "medium",
              estimated_end_date: "",
              team_id: "",
            },
          },
          newEmployee: { name: "", email: "", password: "", role: "employee" },
          newTeam: { team_name: "", manager_id: "" },

          get pageTitle() {
            const map = {
              dashboard: "Dashboard",
              projects: "Projects",
              employees: "Employees",
              teams: "Teams",
              insights: "Insights",
              billing: "Subscription",
            };
            return map[this.tab] || "Dashboard";
          },

          get availableTeams() {
            return this.teams.map((t) => ({
              ...t,
              has_active_project: this.projects.some(
                (p) =>
                  p.assigned_team_id === t.team_id &&
                  p.status !== "completed" &&
                  p.status !== "cancelled",
              ),
            }));
          },

          async init() {
            if (!getToken()) {
              location.href = "../login.html";
              return;
            }
            await this.loadAll();
            this.$nextTick(() => {
              lucide.createIcons();
              this.renderCharts();
            });
          },

          async loadAll() {
            const [insightsRes, projectsRes, employeesRes, teamsRes] =
              await Promise.all([
                api("/api/admin/insights"),
                api("/api/admin/projects"),
                api("/api/admin/employees"),
                api("/api/admin/teams"),
              ]);
            this.stats = insightsRes.data?.summary || {};
            this.topEmployees = insightsRes.data?.topEmployees || [];
            this.projects = projectsRes.data || [];
            this.employees = employeesRes.data || [];
            this.teams = teamsRes.data || [];

            const subRes = await api("/api/admin/subscription");
            this.subscription = subRes.data || {};

            // billing (mock if endpoint not available)
            this.billingHistory = [
              {
                id: 1,
                billing_period: "2026-03",
                base_charge: 299,
                usage_charge: 61.25,
                total_due: 360.25,
                status: "pending",
              },
              {
                id: 2,
                billing_period: "2026-02",
                base_charge: 299,
                usage_charge: 52,
                total_due: 351,
                status: "paid",
              },
              {
                id: 3,
                billing_period: "2026-01",
                base_charge: 299,
                usage_charge: 45.5,
                total_due: 344.5,
                status: "paid",
              },
            ];
          },

          renderCharts() {
            const isDark =
              document.documentElement.getAttribute("data-theme") === "dark";
            const gridColor = isDark
              ? "rgba(255,255,255,0.06)"
              : "rgba(0,0,0,0.06)";
            const textColor = isDark ? "#797876" : "#7a7974";
            const s = this.stats;

            const taskCtx = document.getElementById("taskChart");
            if (taskCtx) {
              new Chart(taskCtx, {
                type: "doughnut",
                data: {
                  labels: ["Completed", "In Progress", "Pending"],
                  datasets: [
                    {
                      data: [
                        s.completed_tasks || 0,
                        s.inprogress_tasks || 0,
                        s.pending_tasks || 0,
                      ],
                      backgroundColor: ["#01696f", "#d19900", "#bab9b4"],
                      borderWidth: 0,
                      hoverOffset: 4,
                    },
                  ],
                },
                options: {
                  plugins: {
                    legend: {
                      position: "bottom",
                      labels: { color: textColor, boxWidth: 12 },
                    },
                  },
                  cutout: "70%",
                },
              });
            }

            const projCtx = document.getElementById("projectChart");
            if (projCtx) {
              new Chart(projCtx, {
                type: "bar",
                data: {
                  labels: this.projects
                    .slice(0, 5)
                    .map((p) => p.name.substring(0, 16) + "…"),
                  datasets: [
                    {
                      label: "Progress %",
                      data: this.projects
                        .slice(0, 5)
                        .map((p) => p.progress || 0),
                      backgroundColor: "#01696f",
                      borderRadius: 4,
                    },
                  ],
                },
                options: {
                  plugins: { legend: { display: false } },
                  scales: {
                    x: {
                      grid: { color: gridColor },
                      ticks: { color: textColor },
                    },
                    y: {
                      max: 100,
                      grid: { color: gridColor },
                      ticks: { color: textColor },
                    },
                  },
                },
              });
            }

            const inCtx = document.getElementById("insightTaskChart");
            if (inCtx) {
              new Chart(inCtx, {
                type: "pie",
                data: {
                  labels: ["Completed", "In Progress", "Pending"],
                  datasets: [
                    {
                      data: [
                        s.completed_tasks || 0,
                        s.inprogress_tasks || 0,
                        s.pending_tasks || 0,
                      ],
                      backgroundColor: ["#437a22", "#01696f", "#d4d1ca"],
                      borderWidth: 0,
                    },
                  ],
                },
                options: {
                  plugins: {
                    legend: {
                      position: "bottom",
                      labels: { color: textColor, boxWidth: 12 },
                    },
                  },
                },
              });
            }
          },

          openCreateProject() {
            this.modal = "createProject";
            this.$nextTick(() => lucide.createIcons());
          },
          openCreateEmployee() {
            this.modal = "createEmployee";
            this.$nextTick(() => lucide.createIcons());
          },
          async openCreateTeam() {
            await this.loadAll(); // ← ensures managers are loaded before modal opens
            this.modal = "createTeam";
            this.$nextTick(() => lucide.createIcons());
          },
          closeModal() {
            this.modal = "";
          },

          async createProject() {
            if (!this.newProject.name) {
              this.toast("Project name is required", "error");
              return;
            }
            this.loading = true;
            const res = await api("/api/admin/projects", {
              method: "POST",
              body: JSON.stringify(this.newProject),
            });
            this.loading = false;
            if (res.success) {
              this.toast("Project created!", "success");
              this.closeModal();
              await this.loadAll();
              this.newProject = {
                name: "",
                description: "",
                type: "",
                priority: "medium",
                estimated_end_date: "",
              };
            } else {
              this.toast(res.error, "error");
            }
          },

          async createEmployee() {
            if (!this.newEmployee.name || !this.newEmployee.email) {
              this.toast("Name and email required", "error");
              return;
            }
            const res = await api("/api/admin/employees", {
              method: "POST",
              body: JSON.stringify(this.newEmployee),
            });
            if (res.success) {
              this.toast("Employee added!", "success");
              this.closeModal();
              await this.loadAll();
            } else {
              this.toast(res.error, "error");
            }
          },

          async createTeam() {
            if (!this.newTeam.team_name || !this.newTeam.manager_id) {
              this.toast("Team name and manager required", "error");
              return;
            }
            const res = await api("/api/admin/teams", {
              method: "POST",
              body: JSON.stringify(this.newTeam),
            });
            if (res.success) {
              this.toast("Team created!", "success");
              this.closeModal();
              await this.loadAll();
            } else {
              this.toast(res.error, "error");
            }
          },

          async deleteProject(id) {
            if (!confirm("Delete this project? This cannot be undone.")) return;
            const res = await api("/api/admin/projects/" + id, {
              method: "DELETE",
            });
            if (res.success) {
              this.toast("Project deleted", "success");
              await this.loadAll();
            } else {
              this.toast(res.error, "error");
            }
          },

          async deleteEmployee(id) {
            if (
              !confirm(
                "Permanently delete this employee? All their tasks, queries and team memberships will be removed. This cannot be undone.",
              )
            )
              return;

            try {
              const res = await api("/api/admin/employees/" + id, {
                method: "DELETE",
              });
              if (res.success) {
                this.toast("Employee permanently deleted", "success");
                // Remove from local array immediately for instant UI feedback
                this.employees = this.employees.filter((e) => e.user_id !== id);
                // Then reload from server to confirm
                await this.loadAll();
              } else {
                this.toast(res.error || "Failed to delete employee", "error");
              }
            } catch (err) {
              this.toast("Network error", "error");
            }
          },

          logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("user");
            location.href = "../login.html";
          },

          toast(msg, type = "success") {
            const id = Date.now();
            this.toasts.push({ id, msg, type });
            setTimeout(() => {
              this.toasts = this.toasts.filter((t) => t.id !== id);
            }, 3500);
          },
        };
      }

      (function () {
        const t = document.querySelector("[data-theme-toggle]"),
          r = document.documentElement;
        let d =
          localStorage.getItem("theme") ||
          (matchMedia("(prefers-color-scheme:dark)").matches
            ? "dark"
            : "light");
        r.setAttribute("data-theme", d);
        if (t)
          t.addEventListener("click", () => {
            d = d === "dark" ? "light" : "dark";
            r.setAttribute("data-theme", d);
            localStorage.setItem("theme", d);
            lucide.createIcons();
          });
      })();
      lucide.createIcons();
    </script>
  </body>
</html>
