<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Dashboard — WorkHive</title>
    <link
      href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      /* ── Design Tokens ── */
      :root {
        --font-display: "Cabinet Grotesk", sans-serif;
        --font-body: "Inter", sans-serif;
        --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
        --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
        --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
        --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
        --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
        --sp1: 0.25rem;
        --sp2: 0.5rem;
        --sp3: 0.75rem;
        --sp4: 1rem;
        --sp5: 1.25rem;
        --sp6: 1.5rem;
        --sp8: 2rem;
        --sp10: 2.5rem;
        --sp12: 3rem;
        --sp16: 4rem;
        --r-sm: 0.375rem;
        --r-md: 0.5rem;
        --r-lg: 0.75rem;
        --r-xl: 1rem;
        --r-full: 9999px;
        --tr: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      :root,
      [data-theme="light"] {
        --bg: #f7f6f2;
        --surf: #f9f8f5;
        --surf2: #fbfbf9;
        --surfoff: #f3f0ec;
        --div: #dcd9d5;
        --bdr: #d4d1ca;
        --txt: #28251d;
        --txtm: #7a7974;
        --txtf: #bab9b4;
        --txti: #f9f8f4;
        --pr: #01696f;
        --prh: #0c4e54;
        --prhi: #cedcd8;
        --err: #a12c7b;
        --suc: #437a22;
        --warn: #964219;
        --shsm: 0 1px 2px oklch(0.2 0.01 80/0.06);
        --shmd: 0 4px 12px oklch(0.2 0.01 80/0.08);
        --shlg: 0 12px 32px oklch(0.2 0.01 80/0.12);
      }
      [data-theme="dark"] {
        --bg: #171614;
        --surf: #1c1b19;
        --surf2: #201f1d;
        --surfoff: #1d1c1a;
        --div: #262523;
        --bdr: #393836;
        --txt: #cdccca;
        --txtm: #797876;
        --txtf: #5a5957;
        --txti: #2b2a28;
        --pr: #4f98a3;
        --prh: #227f8b;
        --prhi: #313b3b;
        --err: #d163a7;
        --suc: #6daa45;
        --warn: #bb653b;
        --shsm: 0 1px 2px oklch(0 0 0/0.2);
        --shmd: 0 4px 12px oklch(0 0 0/0.3);
        --shlg: 0 12px 32px oklch(0 0 0/0.4);
      }

      /* ── Reset ── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        -webkit-font-smoothing: antialiased;
        scroll-behavior: smooth;
      }
      body {
        font-family: var(--font-body);
        font-size: var(--text-sm);
        color: var(--txt);
        background: var(--bg);
        display: flex;
        height: 100dvh;
        overflow: hidden;
      }
      h1,
      h2,
      h3,
      h4 {
        font-family: var(--font-display);
        line-height: 1.2;
      }
      button,
      a {
        transition:
          color var(--tr),
          background var(--tr),
          border-color var(--tr);
        cursor: pointer;
      }
      button {
        border: none;
        background: none;
        font: inherit;
        color: inherit;
      }
      [x-cloak] {
        display: none !important;
      }

      /* ── Sidebar ── */
      .sidebar {
        width: 220px;
        min-width: 220px;
        background: var(--surf);
        border-right: 1px solid var(--div);
        display: flex;
        flex-direction: column;
        height: 100dvh;
        position: sticky;
        top: 0;
        overflow-y: auto;
      }
      .sb-logo {
        display: flex;
        align-items: center;
        gap: var(--sp2);
        padding: var(--sp6) var(--sp5);
        font-family: var(--font-display);
        font-weight: 800;
        font-size: var(--text-base);
        color: var(--txt);
        text-decoration: none;
        border-bottom: 1px solid var(--div);
      }
      .sb-section {
        padding: var(--sp4) var(--sp3);
        font-size: var(--text-xs);
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--txtf);
        margin-top: var(--sp4);
      }
      .sb-item {
        display: flex;
        align-items: center;
        gap: var(--sp3);
        padding: var(--sp2) var(--sp4);
        border-radius: var(--r-lg);
        margin: 0 var(--sp2);
        font-size: var(--text-sm);
        color: var(--txtm);
        text-decoration: none;
      }
      .sb-item:hover,
      .sb-item.active {
        background: var(--surfoff);
        color: var(--txt);
      }
      .sb-item.active {
        color: var(--pr);
        font-weight: 600;
      }
      .sb-item svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
      .sb-bottom {
        margin-top: auto;
        padding: var(--sp4);
        border-top: 1px solid var(--div);
      }
      .sb-user {
        display: flex;
        align-items: center;
        gap: var(--sp3);
      }
      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--prhi);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: var(--text-xs);
        font-weight: 700;
        color: var(--pr);
        flex-shrink: 0;
      }
      .user-name {
        font-size: var(--text-sm);
        font-weight: 600;
        color: var(--txt);
      }
      .user-org {
        font-size: var(--text-xs);
        color: var(--txtm);
      }

      /* ── Main ── */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--sp4) var(--sp8);
        border-bottom: 1px solid var(--div);
        background: var(--surf);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .page-title {
        font-size: var(--text-lg);
        font-weight: 800;
        color: var(--txt);
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: var(--sp3);
      }
      .icon-btn {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--r-md);
        border: 1px solid var(--bdr);
        color: var(--txtm);
      }
      .icon-btn:hover {
        background: var(--surfoff);
      }
      .content {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: var(--sp8);
      }

      /* ── KPI Cards ── */
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(min(180px, 100%), 1fr));
        gap: var(--sp5);
        margin-bottom: var(--sp8);
      }
      .kpi {
        background: var(--surf);
        border: 1px solid var(--bdr);
        border-radius: var(--r-xl);
        padding: var(--sp6);
      }
      .kpi-label {
        font-size: var(--text-xs);
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--txtm);
        margin-bottom: var(--sp2);
      }
      .kpi-val {
        font-size: var(--text-xl);
        font-weight: 800;
        font-family: var(--font-display);
        font-variant-numeric: tabular-nums;
        color: var(--txt);
      }
      .kpi-val.accent {
        color: var(--pr);
      }
      .kpi-sub {
        font-size: var(--text-xs);
        color: var(--txtm);
        margin-top: var(--sp1);
      }
      .kpi-sub.good {
        color: var(--suc);
      }
      .kpi-sub.bad {
        color: var(--err);
      }

      /* ── Section ── */
      .section {
        background: var(--surf);
        border: 1px solid var(--bdr);
        border-radius: var(--r-xl);
        margin-bottom: var(--sp6);
      }
      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--sp5) var(--sp6);
        border-bottom: 1px solid var(--div);
      }
      .section-head h2 {
        font-size: var(--text-base);
        font-weight: 700;
        color: var(--txt);
      }

      /* ── Task Cards ── */
      .task-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(min(280px, 100%), 1fr));
        gap: var(--sp5);
        margin-bottom: var(--sp6);
      }
      .task-card {
        background: var(--surf);
        border: 1px solid var(--bdr);
        border-radius: var(--r-xl);
        padding: var(--sp5);
        display: flex;
        flex-direction: column;
        gap: var(--sp3);
        transition:
          box-shadow var(--tr),
          transform var(--tr);
      }
      .task-card:hover {
        box-shadow: var(--shmd);
        transform: translateY(-1px);
      }
      .task-card.done {
        opacity: 0.6;
      }
      .task-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: var(--sp2);
      }
      .task-name {
        font-weight: 700;
        font-size: var(--text-sm);
        color: var(--txt);
        line-height: 1.4;
        flex: 1;
      }
      .task-desc {
        font-size: var(--text-xs);
        color: var(--txtm);
        line-height: 1.5;
      }
      .task-meta {
        display: flex;
        align-items: center;
        gap: var(--sp3);
        flex-wrap: wrap;
      }
      .task-project {
        font-size: var(--text-xs);
        color: var(--pr);
        font-weight: 600;
      }
      .task-deadline {
        font-size: var(--text-xs);
        color: var(--txtm);
        display: flex;
        align-items: center;
        gap: var(--sp1);
      }
      .task-deadline.overdue {
        color: var(--err);
      }
      .task-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: auto;
      }
      .prog-wrap {
        background: var(--surfoff);
        border-radius: var(--r-full);
        height: 5px;
        overflow: hidden;
      }
      .prog-bar {
        height: 100%;
        background: var(--pr);
        border-radius: var(--r-full);
        transition: width 0.4s ease;
      }

      /* ── Badges ── */
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: var(--r-full);
        font-size: 11px;
        font-weight: 600;
        white-space: nowrap;
      }
      .badge-completed {
        background: oklch(from var(--pr) l c h/.15);
        color: var(--pr);
      }
      .badge-in_progress {
        background: oklch(from var(--warn) l c h/.15);
        color: var(--warn);
      }
      .badge-pending {
        background: oklch(from var(--txtm) l c h/.1);
        color: var(--txtm);
      }
      .badge-high {
        background: oklch(from var(--err) l c h/.12);
        color: var(--err);
      }
      .badge-critical {
        background: oklch(from var(--err) l c h/.2);
        color: var(--err);
      }
      .badge-medium {
        background: oklch(from var(--warn) l c h/.12);
        color: var(--warn);
      }
      .badge-low {
        background: oklch(from var(--txtm) l c h/.1);
        color: var(--txtm);
      }
      .badge-open {
        background: oklch(from var(--warn) l c h/.12);
        color: var(--warn);
      }
      .badge-resolved {
        background: oklch(from var(--pr) l c h/.12);
        color: var(--pr);
      }

      /* ── Buttons ── */
      .btn-sm {
        padding: var(--sp1) var(--sp4);
        font-size: var(--text-xs);
        font-weight: 600;
        border-radius: var(--r-md);
        background: var(--pr);
        color: var(--txti);
        border: none;
      }
      .btn-sm:hover {
        background: var(--prh);
      }
      .btn-sm.ghost {
        background: transparent;
        color: var(--txtm);
        border: 1px solid var(--bdr);
      }
      .btn-sm.ghost:hover {
        background: var(--surfoff);
        color: var(--txt);
      }
      .btn-sm.success {
        background: var(--suc);
      }
      .btn-sm.success:hover {
        filter: brightness(0.9);
      }
      .btn-complete {
        font-size: var(--text-xs);
        font-weight: 600;
        padding: var(--sp1) var(--sp3);
        border-radius: var(--r-md);
        background: var(--prhi);
        color: var(--pr);
        border: 1px solid var(--pr);
      }
      .btn-complete:hover {
        background: var(--pr);
        color: var(--txti);
      }
      .btn-complete:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* ── Table ── */
      .tbl-wrap {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        padding: var(--sp3) var(--sp4);
        text-align: left;
        font-size: var(--text-xs);
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--txtm);
        border-bottom: 1px solid var(--div);
      }
      td {
        padding: var(--sp3) var(--sp4);
        font-size: var(--text-sm);
        color: var(--txt);
        border-bottom: 1px solid var(--div);
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: var(--surfoff);
      }

      /* ── Chart area ── */
      .chart-wrap {
        padding: var(--sp6);
      }

      /* ── Team member card ── */
      .member-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--sp4) var(--sp6);
        border-bottom: 1px solid var(--div);
      }
      .member-row:last-child {
        border-bottom: none;
      }
      .member-info {
        display: flex;
        align-items: center;
        gap: var(--sp3);
      }
      .member-name {
        font-weight: 600;
        font-size: var(--text-sm);
      }
      .member-email {
        font-size: var(--text-xs);
        color: var(--txtm);
      }
      .manager-badge {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        background: var(--prhi);
        color: var(--pr);
        padding: 2px 8px;
        border-radius: var(--r-full);
      }

      /* ── Modal ── */
      .modal-bg {
        position: fixed;
        inset: 0;
        background: oklch(0 0 0/0.45);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--sp4);
      }
      .modal {
        background: var(--surf);
        border-radius: var(--r-xl);
        padding: var(--sp8);
        width: 100%;
        max-width: 480px;
        box-shadow: var(--shlg);
        max-height: 90dvh;
        overflow-y: auto;
      }
      .modal h3 {
        font-size: var(--text-lg);
        font-weight: 800;
        margin-bottom: var(--sp6);
      }
      .field {
        margin-bottom: var(--sp4);
      }
      .field label {
        display: block;
        font-size: var(--text-xs);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--txtm);
        margin-bottom: var(--sp1);
      }
      .field input,
      .field select,
      .field textarea {
        width: 100%;
        padding: var(--sp2) var(--sp3);
        border: 1px solid var(--bdr);
        border-radius: var(--r-md);
        background: var(--surf2);
        color: var(--txt);
        font-size: var(--text-sm);
        font-family: var(--font-body);
      }
      .field input:focus,
      .field select:focus,
      .field textarea:focus {
        outline: 2px solid var(--pr);
        outline-offset: 1px;
      }
      .modal-btns {
        display: flex;
        gap: var(--sp3);
        justify-content: flex-end;
        margin-top: var(--sp6);
      }

      /* ── Query detail expand ── */
      .query-row {
        border-bottom: 1px solid var(--div);
      }
      .query-row:last-child {
        border-bottom: none;
      }
      .query-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--sp4) var(--sp6);
        cursor: pointer;
      }
      .query-header:hover {
        background: var(--surfoff);
      }
      .query-body {
        padding: 0 var(--sp6) var(--sp5);
        border-top: 1px solid var(--div);
      }
      .query-msg {
        font-size: var(--text-sm);
        color: var(--txtm);
        margin-bottom: var(--sp4);
        line-height: 1.6;
      }
      .query-reply {
        background: var(--surfoff);
        border-radius: var(--r-lg);
        padding: var(--sp4);
        font-size: var(--text-sm);
        color: var(--txt);
      }
      .query-reply-label {
        font-size: var(--text-xs);
        font-weight: 700;
        color: var(--pr);
        margin-bottom: var(--sp2);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      /* ── Toast ── */
      .toast-wrap {
        position: fixed;
        top: var(--sp6);
        right: var(--sp6);
        z-index: 200;
        display: flex;
        flex-direction: column;
        gap: var(--sp2);
      }
      .toast {
        background: var(--surf);
        border: 1px solid var(--bdr);
        border-radius: var(--r-lg);
        padding: var(--sp3) var(--sp5);
        font-size: var(--text-sm);
        box-shadow: var(--shmd);
        display: flex;
        align-items: center;
        gap: var(--sp2);
        min-width: 240px;
      }
      .toast.success {
        border-color: var(--suc);
        color: var(--suc);
      }
      .toast.error {
        border-color: var(--err);
        color: var(--err);
      }

      /* ── Empty state ── */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: var(--sp16) var(--sp8);
        color: var(--txtm);
      }
      .empty-icon {
        width: 48px;
        height: 48px;
        color: var(--txtf);
        margin-bottom: var(--sp4);
      }
      .empty-state h3 {
        font-size: var(--text-base);
        font-weight: 700;
        color: var(--txt);
        margin-bottom: var(--sp2);
      }
      .empty-state p {
        font-size: var(--text-sm);
        max-width: 36ch;
      }

      /* ── Spinner ── */
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid var(--prhi);
        border-top-color: var(--pr);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      /* ── Status filter tabs ── */
      .filter-tabs {
        display: flex;
        gap: var(--sp2);
        margin-bottom: var(--sp5);
        flex-wrap: wrap;
      }
      .filter-tab {
        padding: var(--sp1) var(--sp4);
        font-size: var(--text-xs);
        font-weight: 600;
        border-radius: var(--r-full);
        border: 1px solid var(--bdr);
        background: transparent;
        color: var(--txtm);
      }
      .filter-tab.active {
        background: var(--pr);
        color: var(--txti);
        border-color: var(--pr);
      }
      .filter-tab:hover:not(.active) {
        background: var(--surfoff);
        color: var(--txt);
      }

      /* ── Responsive ── */
      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
        .content {
          padding: var(--sp5);
        }
        .task-grid {
          grid-template-columns: 1fr;
        }
      }
      /* ── Chat ── */
      .chat-wrap {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 120px);
        background: var(--surf);
        border: 1px solid var(--bdr);
        border-radius: var(--r-xl);
        overflow: hidden;
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: var(--sp4);
        display: flex;
        flex-direction: column;
        gap: var(--sp3);
      }
      .chat-msg {
        max-width: 75%;
        display: flex;
        flex-direction: column;
        gap: var(--sp1);
      }
      .chat-msg.mine {
        align-self: flex-end;
        align-items: flex-end;
      }
      .chat-msg.other {
        align-self: flex-start;
        align-items: flex-start;
      }
      .chat-bubble {
        padding: var(--sp2) var(--sp4);
        border-radius: var(--r-xl);
        font-size: var(--text-sm);
        line-height: 1.5;
        word-break: break-word;
      }
      .chat-msg.mine .chat-bubble {
        background: var(--pr);
        color: var(--txti);
        border-bottom-right-radius: var(--r-sm);
      }
      .chat-msg.other .chat-bubble {
        background: var(--surfoff);
        color: var(--txt);
        border-bottom-left-radius: var(--r-sm);
      }
      .chat-meta {
        font-size: 10px;
        color: var(--txtm);
        padding: 0 var(--sp1);
      }
      .chat-mention {
        color: var(--pr);
        font-weight: 600;
        background: var(--prhi);
        padding: 1px 4px;
        border-radius: var(--r-sm);
      }
      .chat-hashtag {
        color: var(--warn);
        font-weight: 600;
      }
      .chat-input-bar {
        display: flex;
        gap: var(--sp2);
        padding: var(--sp3) var(--sp4);
        border-top: 1px solid var(--div);
        background: var(--surf2);
        position: relative;
      }
      .chat-input {
        flex: 1;
        padding: var(--sp2) var(--sp4);
        border: 1px solid var(--bdr);
        border-radius: var(--r-full);
        background: var(--surf);
        color: var(--txt);
        font-size: var(--text-sm);
        font-family: var(--font-body);
        resize: none;
        outline: none;
      }
      .chat-input:focus {
        border-color: var(--pr);
      }
      .chat-send-btn {
        padding: var(--sp2) var(--sp5);
        background: var(--pr);
        color: var(--txti);
        border-radius: var(--r-full);
        font-size: var(--text-sm);
        font-weight: 600;
        flex-shrink: 0;
      }
      .chat-send-btn:hover {
        background: var(--prh);
      }
      /* Suggestion dropdown */
      .suggest-dropdown {
        position: absolute;
        bottom: 70px;
        left: var(--sp4);
        background: var(--surf);
        border: 1px solid var(--bdr);
        border-radius: var(--r-lg);
        box-shadow: var(--shmd);
        min-width: 200px;
        max-height: 200px;
        overflow-y: auto;
        z-index: 50;
      }
      .suggest-item {
        padding: var(--sp2) var(--sp4);
        font-size: var(--text-sm);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: var(--sp2);
      }
      .suggest-item:hover,
      .suggest-item.active {
        background: var(--surfoff);
      }
      .suggest-avatar {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: var(--prhi);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
        color: var(--pr);
        flex-shrink: 0;
      }
    </style>
  </head>
  <body x-data="employeeApp()" @keydown.escape="modal = ''">
    <!-- ════════════════════════════════════════
     SIDEBAR
════════════════════════════════════════ -->
    <aside class="sidebar">
      <a href="#" class="sb-logo">
        <svg
          width="22"
          height="22"
          viewBox="0 0 28 28"
          fill="none"
          aria-label="WorkHive"
        >
          <rect
            x="2"
            y="2"
            width="10"
            height="10"
            rx="2"
            fill="currentColor"
            opacity=".9"
          />
          <rect
            x="16"
            y="2"
            width="10"
            height="10"
            rx="2"
            fill="currentColor"
            opacity=".5"
          />
          <rect
            x="2"
            y="16"
            width="10"
            height="10"
            rx="2"
            fill="currentColor"
            opacity=".5"
          />
          <rect
            x="16"
            y="16"
            width="10"
            height="10"
            rx="2"
            fill="currentColor"
          />
        </svg>
        WorkHive
      </a>

      <div class="sb-section">My Work</div>
      <a
        class="sb-item"
        :class="{active: tab==='dashboard'}"
        @click="tab='dashboard'"
        href="#"
      >
        <i data-lucide="layout-dashboard"></i> Dashboard
      </a>
      <a
        class="sb-item"
        :class="{active: tab==='tasks'}"
        @click="tab='tasks'"
        href="#"
      >
        <i data-lucide="check-square"></i> My Tasks
        <span
          x-show="pendingCount > 0"
          style="
            margin-left: auto;
            background: var(--warn);
            color: white;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 9999px;
            font-weight: 700;
          "
          x-text="pendingCount"
        ></span>
      </a>

      <div class="sb-section">Team</div>
      <a
        class="sb-item"
        :class="{active: tab==='team'}"
        @click="tab='team'"
        href="#"
      >
        <i data-lucide="users"></i> My Team
      </a>

      <div class="sb-section">Support</div>
      <a
        class="sb-item"
        :class="{active: tab==='queries'}"
        @click="tab='queries'"
        href="#"
      >
        <i data-lucide="message-circle"></i> My Queries
        <span
          x-show="openQueryCount > 0"
          style="
            margin-left: auto;
            background: var(--pr);
            color: var(--txti);
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 9999px;
            font-weight: 700;
          "
          x-text="openQueryCount"
        ></span>
      </a>

      <div class="sb-bottom">
        <a href="../shared/profile.html" style="text-decoration: none;">
          <div class="sb-user">
            <div class="avatar" x-text="user?.name?.[0] ?? 'E'"></div>
            <div>
              <div class="user-name" x-text="user?.name ?? 'Employee'"></div>
              <div
                class="user-org"
                x-text="user?.org_name ?? 'Organisation'"
              ></div>
            </div>
          </div>
        </a>
        <button
          @click="logout()"
          style="
            margin-top: var(--sp3);
            width: 100%;
            padding: var(--sp2);
            border-radius: var(--r-md);
            font-size: var(--text-xs);
            color: var(--txtm);
            border: 1px solid var(--bdr);
            display: flex;
            align-items: center;
            gap: var(--sp2);
          "
        >
          <i data-lucide="log-out" style="width: 14px; height: 14px"></i> Sign
          out
        </button>
      </div>
    </aside>

    <!-- ════════════════════════════════════════
     MAIN CONTENT
════════════════════════════════════════ -->
    <main class="main">
      <!-- Topbar -->
      <header class="topbar">
        <div style="display: flex; align-items: center; gap: var(--sp3)">
          <h1 class="page-title" x-text="pageTitle"></h1>
          <span
            style="
              font-size: var(--text-xs);
              font-weight: 600;
              background: var(--prhi);
              color: var(--pr);
              padding: 2px 10px;
              border-radius: var(--r-full);
              white-space: nowrap;
            "
            x-text="user?.org_name ?? ''"
          ></span>
        </div>
        <div class="topbar-right">
          <!-- Notification bell -->
          <button
            class="icon-btn"
            style="position: relative"
            aria-label="Notifications"
          >
            <i data-lucide="bell" style="width: 16px; height: 16px"></i>
            <span
              x-show="pendingCount > 0"
              style="
                position: absolute;
                top: 6px;
                right: 6px;
                width: 7px;
                height: 7px;
                background: var(--err);
                border-radius: 50%;
                border: 2px solid var(--surf);
              "
            ></span>
          </button>
          <!-- Theme toggle -->
          <button class="icon-btn" data-theme-toggle aria-label="Toggle theme">
            <i data-lucide="sun" style="width: 16px; height: 16px"></i>
          </button>
        </div>
      </header>

      <!-- Scrollable content -->
      <div class="content">
        <!-- ════ DASHBOARD TAB ════ -->
        <template x-if="tab === 'dashboard'">
          <div>
            <!-- Welcome banner -->
            <div
              style="
                background: var(--prhi);
                border: 1px solid var(--pr);
                border-radius: var(--r-xl);
                padding: var(--sp6);
                margin-bottom: var(--sp8);
                display: flex;
                align-items: center;
                gap: var(--sp4);
              "
            >
              <div
                class="avatar"
                style="width: 48px; height: 48px; font-size: var(--text-base)"
                x-text="user?.name?.[0]??'E'"
              ></div>
              <div>
                <div
                  style="
                    font-size: var(--text-base);
                    font-weight: 800;
                    font-family: var(--font-display);
                    color: var(--txt);
                  "
                  x-text="'Good evening, ' + (user?.name?.split(' ')[0] ?? 'there') + '!'"
                ></div>
                <div
                  style="font-size: var(--text-sm); color: var(--pr)"
                  x-show="pendingCount > 0"
                  x-text="pendingCount + ' pending task' + (pendingCount === 1 ? '' : 's') + ' need your attention'"
                ></div>

                <!-- ✅ Shows a positive message when all tasks are done -->
                <div
                  style="font-size: var(--text-sm); color: var(--suc)"
                  x-show="pendingCount === 0 && tasks.length > 0"
                >
                  ✓ All tasks are up to date
                </div>

                <!-- ✅ Shows when no tasks assigned at all -->
                <div
                  style="font-size: var(--text-sm); color: var(--txtm)"
                  x-show="tasks.length === 0"
                >
                  No tasks assigned yet
                </div>
              </div>
              <button
                class="btn-sm"
                style="margin-left: auto"
                @click="tab='tasks'"
              >
                View Tasks
              </button>
            </div>

            <!-- KPI cards -->
            <div class="kpi-grid">
              <div class="kpi">
                <div class="kpi-label">Total Tasks</div>
                <div class="kpi-val" x-text="tasks.length"></div>
                <div class="kpi-sub">Assigned to me</div>
              </div>
              <div class="kpi">
                <div class="kpi-label">Completed</div>
                <div class="kpi-val accent" x-text="completedCount"></div>
                <div
                  class="kpi-sub good"
                  x-text="tasks.length > 0 ? Math.round(completedCount/tasks.length*100) + '% completion rate' : '—'"
                ></div>
              </div>
              <div class="kpi">
                <div class="kpi-label">In Progress</div>
                <div class="kpi-val" x-text="inProgressCount"></div>
                <div class="kpi-sub">Currently working</div>
              </div>
              <div class="kpi">
                <div class="kpi-label">Pending</div>
                <div
                  class="kpi-val"
                  :style="pendingCount > 0 ? 'color:var(--warn)' : ''"
                  x-text="pendingCount"
                ></div>
                <div
                  class="kpi-sub"
                  :class="pendingCount > 0 ? 'bad' : 'good'"
                  x-text="pendingCount > 0 ? 'Needs attention' : 'All clear ✓'"
                ></div>
              </div>
            </div>

            <!-- Task status chart + recent tasks -->
            <div
              style="
                display: grid;
                grid-template-columns: 1fr 1.6fr;
                gap: var(--sp6);
                margin-bottom: var(--sp6);
              "
            >
              <div class="section">
                <div class="section-head"><h2>Task Breakdown</h2></div>
                <div
                  class="chart-wrap"
                  style="
                    display: flex;
                    align-items: center;
                    justify-content: center;
                  "
                >
                  <canvas id="taskDonut" height="220"></canvas>
                </div>
              </div>
              <div class="section">
                <div class="section-head">
                  <h2>Recent Tasks</h2>
                  <button class="btn-sm ghost" @click="tab='tasks'">
                    See all
                  </button>
                </div>
                <div>
                  <template x-for="t in tasks.slice(0,5)" :key="t.task_id">
                    <div
                      style="
                        display: flex;
                        align-items: center;
                        justify-content: space-between;
                        padding: var(--sp3) var(--sp6);
                        border-bottom: 1px solid var(--div);
                      "
                    >
                      <div>
                        <div
                          style="
                            font-weight: 600;
                            font-size: var(--text-sm);
                            color: var(--txt);
                          "
                          x-text="t.name?.substring(0,32) + (t.name?.length > 32 ? '…' : '')"
                        ></div>
                        <div
                          style="font-size: var(--text-xs); color: var(--txtm)"
                          x-text="t.project_name ?? '—'"
                        ></div>
                      </div>
                      <span
                        class="badge"
                        :class="'badge-'+t.status"
                        x-text="t.status.replace('_',' ')"
                      ></span>
                    </div>
                  </template>
                  <div
                    x-show="tasks.length === 0"
                    class="empty-state"
                    style="padding: var(--sp8)"
                  >
                    <div class="empty-icon">
                      <i
                        data-lucide="inbox"
                        style="width: 48px; height: 48px"
                      ></i>
                    </div>
                    <h3>No tasks yet</h3>
                    <p>Your manager hasn't assigned any tasks yet.</p>
                  </div>
                </div>
              </div>
            </div>

            <!-- Notifications from team -->
            <div class="section" x-show="team">
              <div class="section-head">
                <h2>Your Team</h2>
                <button class="btn-sm ghost" @click="tab='team'">
                  View team
                </button>
              </div>
              <div class="member-row" x-show="team">
                <div class="member-info">
                  <div
                    class="avatar"
                    style="
                      background: oklch(from var(--warn) l c h/.15);
                      color: var(--warn);
                    "
                    x-text="team?.manager_name?.[0]??'M'"
                  ></div>
                  <div>
                    <div
                      class="member-name"
                      x-text="team?.manager_name ?? 'Your Manager'"
                    ></div>
                    <div
                      class="member-email"
                      x-text="team?.manager_email ?? ''"
                    ></div>
                  </div>
                </div>
                <span class="manager-badge">Manager</span>
              </div>
            </div>
          </div>
        </template>

        <!-- ════ TASKS TAB ════ -->
        <template x-if="tab === 'tasks'">
          <div>
            <!-- Filter tabs -->
            <div class="filter-tabs">
              <button
                class="filter-tab"
                :class="{active: taskFilter==='all'}"
                @click="taskFilter='all'"
              >
                All (<span x-text="tasks.length"></span>)
              </button>
              <button
                class="filter-tab"
                :class="{active: taskFilter==='pending'}"
                @click="taskFilter='pending'"
              >
                Pending (<span x-text="pendingCount"></span>)
              </button>
              <button
                class="filter-tab"
                :class="{active: taskFilter==='in_progress'}"
                @click="taskFilter='in_progress'"
              >
                In Progress (<span x-text="inProgressCount"></span>)
              </button>
              <button
                class="filter-tab"
                :class="{active: taskFilter==='completed'}"
                @click="taskFilter='completed'"
              >
                Completed (<span x-text="completedCount"></span>)
              </button>
            </div>

            <!-- Task cards grid -->
            <div class="task-grid">
              <template x-for="t in filteredTasks" :key="t.task_id">
                <div class="task-card" :class="{done: t.status==='completed'}">
                  <!-- Header -->
                  <div class="task-header">
                    <div class="task-name" x-text="t.name"></div>
                    <span
                      class="badge"
                      :class="'badge-'+t.priority"
                      x-text="t.priority"
                      style="flex-shrink: 0"
                    ></span>
                  </div>

                  <!-- Description -->
                  <p
                    class="task-desc"
                    x-text="t.description ?? 'No description provided.'"
                    style="
                      display: -webkit-box;
                      -webkit-line-clamp: 2;
                      line-clamp: 2;
                      -webkit-box-orient: vertical;
                      overflow: hidden;
                    "
                  ></p>

                  <!-- Meta info -->
                  <div class="task-meta">
                    <span
                      class="task-project"
                      x-text="'📁 ' + (t.project_name ?? '—')"
                    ></span>
                    <span
                      class="task-deadline"
                      :class="isOverdue(t.deadline) && t.status!=='completed' ? 'overdue' : ''"
                      x-text="t.deadline ? fmtDate(t.deadline) : 'No deadline'"
                    >
                    </span>
                  </div>

                  <!-- Progress bar for in_progress tasks -->
                  <div x-show="t.status === 'in_progress'">
                    <div
                      style="
                        display: flex;
                        justify-content: space-between;
                        font-size: 11px;
                        color: var(--txtm);
                        margin-bottom: var(--sp1);
                      "
                    >
                      <span>Progress</span
                      ><span x-text="(t.completion_pct ?? 0) + '%'"></span>
                    </div>
                    <div class="prog-wrap">
                      <div
                        class="prog-bar"
                        :style="'width:' + (t.completion_pct ?? 0) + '%'"
                      ></div>
                    </div>
                  </div>

                  <!-- Footer -->
                  <div class="task-footer">
                    <span
                      class="badge"
                      :class="'badge-'+t.status"
                      x-text="t.status.replace('_',' ')"
                    ></span>
                    <button
                      class="btn-complete"
                      x-show="t.status !== 'completed'"
                      @click="markTask(t.task_id, t.status === 'pending' ? 'in_progress' : 'completed')"
                      :disabled="updatingTask === t.task_id"
                      x-text="t.status === 'pending' ? 'Start' : 'Mark Done'"
                    ></button>
                    <span
                      x-show="t.status === 'completed'"
                      style="
                        font-size: var(--text-xs);
                        color: var(--suc);
                        font-weight: 600;
                      "
                      >✓ Done</span
                    >
                  </div>
                </div>
              </template>
            </div>

            <!-- Empty state -->
            <div x-show="filteredTasks.length === 0" class="section">
              <div class="empty-state">
                <div class="empty-icon">
                  <i
                    data-lucide="check-circle"
                    style="width: 48px; height: 48px"
                  ></i>
                </div>
                <h3
                  x-text="taskFilter === 'completed' ? 'No completed tasks yet' : 'No ' + taskFilter.replace('_',' ') + ' tasks'"
                ></h3>
                <p
                  x-text="taskFilter === 'all' ? 'Your manager hasn\'t assigned any tasks yet.' : 'Switch filters to see other tasks.'"
                ></p>
              </div>
            </div>
          </div>
        </template>

        <!-- ════ TEAM TAB ════ -->
        <template x-if="tab === 'team'">
          <div>
            <!-- Team info card -->
            <div
              x-show="team"
              class="section"
              style="margin-bottom: var(--sp6)"
            >
              <div class="section-head">
                <h2 x-text="team?.name ?? team?.team_name ?? 'My Team'"></h2>
                <span
                  style="font-size: var(--text-xs); color: var(--txtm)"
                  x-text="(team?.members?.length ?? 0) + ' members'"
                ></span>
              </div>

              <!-- Manager row -->
              <div class="member-row" x-show="team?.manager_name">
                <div class="member-info">
                  <div
                    class="avatar"
                    style="
                      background: oklch(from var(--warn) l c h/.15);
                      color: var(--warn);
                    "
                    x-text="team?.manager_name?.[0]??'M'"
                  ></div>
                  <div>
                    <div class="member-name" x-text="team?.manager_name"></div>
                    <div
                      class="member-email"
                      x-text="team?.manager_email ?? ''"
                    ></div>
                  </div>
                </div>
                <span class="manager-badge">Manager</span>
              </div>

              <!-- Team members -->
              <template x-for="m in (team?.members ?? [])" :key="m.user_id">
                <div class="member-row">
                  <div class="member-info">
                    <div class="avatar" x-text="m.name?.[0]??'?'"></div>
                    <div>
                      <div class="member-name" x-text="m.name"></div>
                      <div class="member-email" x-text="m.email"></div>
                    </div>
                  </div>
                  <div style="text-align: right">
                    <div
                      style="font-size: var(--text-xs); color: var(--txtm)"
                      x-text="(m.completed_tasks??0) + '/' + (m.total_tasks??0) + ' tasks done'"
                    ></div>
                    <div style="margin-top: var(--sp1); min-width: 80px">
                      <div class="prog-wrap">
                        <div
                          class="prog-bar"
                          :style="'width:' + (m.total_tasks > 0 ? Math.round((m.completed_tasks??0)/m.total_tasks*100) : 0) + '%'"
                        ></div>
                      </div>
                    </div>
                  </div>
                </div>
              </template>

              <div
                x-show="!team?.members?.length"
                class="empty-state"
                style="padding: var(--sp8)"
              >
                <div class="empty-icon">
                  <i data-lucide="users" style="width: 40px; height: 40px"></i>
                </div>
                <h3>No teammates yet</h3>
                <p>Your manager hasn't added other members to this team.</p>
              </div>
            </div>

            <!-- Not in team -->
            <div x-show="!team" class="section">
              <div class="empty-state">
                <div class="empty-icon">
                  <i
                    data-lucide="users-x"
                    style="width: 48px; height: 48px"
                  ></i>
                </div>
                <h3>Not assigned to a team</h3>
                <p>Ask your admin or manager to add you to a team.</p>
              </div>
            </div>
          </div>
        </template>

        <!-- ════ QUERIES TAB ════ -->
        <template x-if="tab === 'queries'">
          <div>
            <!-- Raise query button -->
            <div
              style="
                display: flex;
                justify-content: flex-end;
                margin-bottom: var(--sp5);
              "
            >
              <button class="btn-sm" @click="modal='raiseQuery'">
                <i
                  data-lucide="plus"
                  style="width: 12px; height: 12px; display: inline"
                ></i>
                Raise Query
              </button>
            </div>

            <!-- Queries list -->
            <div class="section" x-show="queries.length > 0">
              <div class="section-head">
                <h2>My Queries</h2>
                <span
                  style="font-size: var(--text-xs); color: var(--txtm)"
                  x-text="openQueryCount + ' open · ' + (queries.length - openQueryCount) + ' resolved'"
                ></span>
              </div>
              <template x-for="(q, idx) in queries" :key="q.id">
                <div class="query-row">
                  <!-- Header row (clickable to expand) -->
                  <div
                    class="query-header"
                    @click="expandedQuery = expandedQuery === q.id ? null : q.id"
                  >
                    <div style="flex: 1">
                      <div
                        style="
                          font-weight: 600;
                          font-size: var(--text-sm);
                          color: var(--txt);
                        "
                        x-text="q.subject"
                      ></div>
                      <div
                        style="
                          font-size: var(--text-xs);
                          color: var(--txtm);
                          margin-top: 2px;
                        "
                        x-text="'To: ' + (q.manager_name ?? 'Manager') + ' · ' + (q.created_at?.substring(0,10) ?? '')"
                      ></div>
                    </div>
                    <div
                      style="
                        display: flex;
                        align-items: center;
                        gap: var(--sp3);
                      "
                    >
                      <span
                        class="badge"
                        :class="q.is_answered ? 'badge-resolved' : 'badge-open'"
                        x-text="q.is_answered ? 'Resolved' : 'Open'"
                      ></span>
                      <i
                        :data-lucide="expandedQuery === q.id ? 'chevron-up' : 'chevron-down'"
                        style="width: 16px; height: 16px; color: var(--txtm)"
                      ></i>
                    </div>
                  </div>

                  <!-- Expanded body -->
                  <div
                    class="query-body"
                    x-show="expandedQuery === q.id"
                    x-transition
                  >
                    <p class="query-msg" x-text="q.message"></p>

                    <!-- Reply -->
                    <div x-show="q.reply" class="query-reply">
                      <div class="query-reply-label">Manager's Reply</div>
                      <p x-text="q.reply"></p>
                    </div>

                    <!-- Awaiting reply -->
                    <div
                      x-show="!q.reply"
                      style="
                        font-size: var(--text-xs);
                        color: var(--txtm);
                        display: flex;
                        align-items: center;
                        gap: var(--sp2);
                      "
                    >
                      <i
                        data-lucide="clock"
                        style="width: 14px; height: 14px"
                      ></i>
                      Awaiting reply from manager...
                    </div>
                  </div>
                </div>
              </template>
            </div>

            <!-- Empty state -->
            <div x-show="queries.length === 0" class="section">
              <div class="empty-state">
                <div class="empty-icon">
                  <i
                    data-lucide="message-circle"
                    style="width: 48px; height: 48px"
                  ></i>
                </div>
                <h3>No queries raised</h3>
                <p>
                  Have a question for your manager? Raise a query and they'll be
                  notified.
                </p>
                <button
                  class="btn-sm"
                  style="margin-top: var(--sp5)"
                  @click="modal='raiseQuery'"
                >
                  Raise first query
                </button>
              </div>
            </div>
          </div>
        </template>
        <!-- ════ CHAT TAB ════ -->
        <template x-if="tab === 'chat'">
          <div>
            <div
              style="
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: var(--sp4);
              "
            >
              <div>
                <div
                  style="font-size: var(--text-base); font-weight: 700"
                  x-text="team?.name ?? team?.team_name ?? 'Team Chat'"
                ></div>
                <div
                  style="font-size: var(--text-xs); color: var(--txtm)"
                  x-text="(team?.members?.length ?? 0) + ' members'"
                ></div>
              </div>
              <button class="btn-sm ghost" @click="loadChat()">
                <i
                  data-lucide="refresh-cw"
                  style="width: 12px; height: 12px"
                ></i>
                Refresh
              </button>
            </div>

            <div class="chat-wrap" x-ref="chatWrap">
              <!-- Messages -->
              <div class="chat-messages" x-ref="msgList">
                <div
                  x-show="chatMessages.length === 0"
                  style="
                    text-align: center;
                    color: var(--txtm);
                    padding: var(--sp10);
                    font-size: var(--text-sm);
                  "
                >
                  No messages yet. Say hello to your team! 👋
                </div>
                <template x-for="msg in chatMessages" :key="msg.message_id">
                  <div
                    class="chat-msg"
                    :class="msg.sender_id === user?.user_id ? 'mine' : 'other'"
                  >
                    <div
                      class="chat-meta"
                      x-show="msg.sender_id !== user?.user_id"
                      x-text="msg.sender_name"
                    ></div>
                    <div
                      class="chat-bubble"
                      x-html="formatMessage(msg.message)"
                    ></div>
                    <div
                      class="chat-meta"
                      x-text="formatTime(msg.created_at)"
                    ></div>
                  </div>
                </template>
              </div>

              <!-- Suggestion dropdown -->
              <div
                class="suggest-dropdown"
                x-show="suggestions.length > 0"
                x-cloak
              >
                <template x-for="(s, idx) in suggestions" :key="s.id">
                  <div
                    class="suggest-item"
                    :class="{active: idx === suggestIdx}"
                    @click="insertSuggestion(s)"
                    @mouseenter="suggestIdx = idx"
                  >
                    <template x-if="s.type === 'user'">
                      <div class="suggest-avatar" x-text="s.label[0]"></div>
                    </template>
                    <template x-if="s.type === 'project'">
                      <span style="font-size: 12px">📁</span>
                    </template>
                    <span x-text="s.label"></span>
                  </div>
                </template>
              </div>

              <!-- Input bar -->
              <div class="chat-input-bar">
                <textarea
                  class="chat-input"
                  rows="1"
                  placeholder="Type a message... @ to mention, # for projects"
                  x-model="chatInput"
                  @input="onChatInput($event)"
                  @keydown="onChatKeydown($event)"
                  x-ref="chatInput"
                ></textarea>
                <button
                  class="chat-send-btn"
                  @click="sendMessage()"
                  :disabled="!chatInput.trim()"
                >
                  Send
                </button>
              </div>
            </div>
          </div>
        </template>
      </div>
      <a
        class="sb-item"
        :class="{active:tab==='chat'}"
        @click="tab='chat'; loadChat(); $nextTick(()=>lucide.createIcons())"
        href="#"
      >
        <i data-lucide="message-square-text"></i> Team Chat
      </a>
      <!-- /content -->
    </main>

    <!-- ════════════════════════════════════════
     RAISE QUERY MODAL
════════════════════════════════════════ -->
    <div
      class="modal-bg"
      x-show="modal === 'raiseQuery'"
      x-cloak
      @click.self="modal = ''"
    >
      <div class="modal">
        <h3>Raise a Query</h3>
        <p
          style="
            font-size: var(--text-sm);
            color: var(--txtm);
            margin-bottom: var(--sp6);
          "
        >
          Your message will be sent directly to your team manager.
        </p>

        <div class="field">
          <label>Subject</label>
          <input
            type="text"
            x-model="newQuery.subject"
            placeholder="e.g. Clarification on task deadline"
          />
        </div>
        <div class="field">
          <label>Message</label>
          <textarea
            x-model="newQuery.message"
            rows="5"
            placeholder="Describe your query in detail..."
          ></textarea>
        </div>

        <div
          x-show="queryError"
          style="
            background: oklch(from var(--err) l c h/.1);
            border: 1px solid var(--err);
            padding: var(--sp3);
            border-radius: var(--r-md);
            font-size: var(--text-sm);
            color: var(--err);
            margin-bottom: var(--sp4);
          "
          x-text="queryError"
        ></div>

        <div class="modal-btns">
          <button class="btn-sm ghost" @click="modal = ''">Cancel</button>
          <button
            class="btn-sm"
            @click="submitQuery()"
            :disabled="submittingQuery"
          >
            <div
              class="spinner"
              x-show="submittingQuery"
              style="width: 12px; height: 12px; display: inline-flex"
            ></div>
            <span
              x-text="submittingQuery ? 'Submitting...' : 'Submit Query'"
            ></span>
          </button>
        </div>
      </div>
    </div>

    <!-- ════════════════════════════════════════
     TOASTS
════════════════════════════════════════ -->
    <div class="toast-wrap">
      <template x-for="t in toasts" :key="t.id">
        <div class="toast" :class="t.type">
          <i
            :data-lucide="t.type === 'success' ? 'check-circle' : 'alert-circle'"
            style="width: 16px; height: 16px; flex-shrink: 0"
          ></i>
          <span x-text="t.msg"></span>
        </div>
      </template>
    </div>

    <script>
      // ─── API helper ─────────────────────────────────────────────────────────────
      const API = "http://localhost:3000";
      function getToken() {
        return localStorage.getItem("token");
      }
      function getUser() {
        try {
          return JSON.parse(localStorage.getItem("user"));
        } catch {
          return null;
        }
      }

      async function api(path, opts = {}) {
        const res = await fetch(API + path, {
          ...opts,
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + getToken(),
            ...(opts.headers || {}),
          },
        });
        const data = await res.json();

        // Only logout on 401 (expired/invalid token) — NOT on 403 (forbidden/plan limit)
        if (res.status === 401) {
          location.href = "../login.html";
        }

        return data;
      }

      // Global date formatter — use everywhere dates are displayed
      function formatDate(dateStr) {
        if (!dateStr) return "—";
        const date = new Date(dateStr);
        if (isNaN(date.getTime())) return dateStr;
        return date.toLocaleDateString("en-IN", {
          day: "2-digit",
          month: "short",
          year: "numeric",
        });
        // Output: 31 May 2026
      }

      // Short version — just the date part from ISO strings
      function fmtDate(dateStr) {
        if (!dateStr) return "—";
        // Handle both '2026-05-31' and '2026-05-31T18:30:00.000Z'
        return dateStr.substring(0, 10);
        // Output: 2026-05-31
      }

      // ─── Main Alpine component ───────────────────────────────────────────────────
      function employeeApp() {
        return {
          // State
          tab: "dashboard",
          user: getUser(),
          tasks: [],
          team: null,
          queries: [],
          taskFilter: "all",
          expandedQuery: null,
          updatingTask: null,
          modal: "",
          newQuery: { subject: "", message: "" },
          queryError: "",
          submittingQuery: false,
          toasts: [],
          chatMessages: [],
          chatInput: "",
          suggestions: [],
          suggestIdx: 0,
          suggestTrigger: null, // '@' or '#'
          suggestStart: 0,

          // ─── Computed ───────────────────────────────────────────────────────────
          get pageTitle() {
            const map = {
              dashboard: "Dashboard",
              tasks: "My Tasks",
              team: "My Team",
              queries: "My Queries",
            };
            return map[this.tab] || "Dashboard";
          },
          get completedCount() {
            return this.tasks.filter((t) => t.status === "completed").length;
          },
          get inProgressCount() {
            return this.tasks.filter((t) => t.status === "in_progress").length;
          },
          get pendingCount() {
            return this.tasks.filter((t) => t.status === "pending").length;
          },
          get openQueryCount() {
            return this.queries.filter((q) => !q.is_answered).length;
          },
          get filteredTasks() {
            if (this.taskFilter === "all") return this.tasks;
            return this.tasks.filter((t) => t.status === this.taskFilter);
          },

          // ─── Init ───────────────────────────────────────────────────────────────
          async init() {
            if (!getToken()) {
              location.href = "../login.html";
              return;
            }
            await this.loadAll();
            this.$nextTick(() => {
              lucide.createIcons();
              this.renderChart();
            });
          },

          async loadAll() {
            const [tasksRes, teamRes, queriesRes] = await Promise.all([
              api("/api/employee/tasks"),
              api("/api/employee/team"),
              api("/api/employee/queries"),
            ]);
            this.tasks = tasksRes.data || [];
            this.team = teamRes.data || null;
            this.queries = queriesRes.data || [];
          },

          // ─── Chart ──────────────────────────────────────────────────────────────
          renderChart() {
            const ctx = document.getElementById("taskDonut");
            if (!ctx) return;
            const isDark =
              document.documentElement.getAttribute("data-theme") === "dark";
            const textColor = isDark ? "#797876" : "#7a7974";

            new Chart(ctx, {
              type: "doughnut",
              data: {
                labels: ["Completed", "In Progress", "Pending"],
                datasets: [
                  {
                    data: [
                      this.completedCount,
                      this.inProgressCount,
                      this.pendingCount,
                    ],
                    backgroundColor: ["#01696f", "#d19900", "#d4d1ca"],
                    borderWidth: 0,
                    hoverOffset: 4,
                  },
                ],
              },
              options: {
                plugins: {
                  legend: {
                    position: "bottom",
                    labels: { color: textColor, boxWidth: 12, padding: 16 },
                  },
                },
                cutout: "72%",
              },
            });
          },

          // ─── Task actions ────────────────────────────────────────────────────────
          isOverdue(deadline) {
            if (!deadline) return false;
            return new Date(deadline) < new Date();
          },

          async markTask(taskId, newStatus) {
            this.updatingTask = taskId;
            try {
              const res = await api(
                "/api/employee/tasks/" + taskId + "/status",
                {
                  method: "PUT",
                  body: JSON.stringify({ status: newStatus }),
                },
              );
              if (res.success) {
                // Update local state immediately for snappy UI
                const task = this.tasks.find((t) => t.task_id === taskId);
                if (task) {
                  task.status = newStatus;
                  if (newStatus === "in_progress") task.completion_pct = 30;
                  if (newStatus === "completed") task.completion_pct = 100;
                }
                this.toast(
                  newStatus === "completed"
                    ? "🎉 Task completed!"
                    : "Task started!",
                  "success",
                );
                // Re-render chart with updated counts
                this.$nextTick(() => {
                  const old = document.getElementById("taskDonut");
                  if (old) {
                    old.parentNode.removeChild(old);
                  }
                  const canvas = document.createElement("canvas");
                  canvas.id = "taskDonut";
                  canvas.height = 220;
                  document.querySelector(".chart-wrap")?.appendChild(canvas);
                  this.renderChart();
                });
              } else {
                this.toast(res.error || "Failed to update task", "error");
              }
            } catch (err) {
              this.toast("Network error. Please try again.", "error");
            } finally {
              this.updatingTask = null;
              lucide.createIcons();
            }
          },

          // ─── Query actions ────────────────────────────────────────────────────────
          async submitQuery() {
            this.queryError = "";
            if (!this.newQuery.subject.trim()) {
              this.queryError = "Subject is required.";
              return;
            }
            if (!this.newQuery.message.trim()) {
              this.queryError = "Message cannot be empty.";
              return;
            }
            if (!this.team) {
              this.queryError =
                "You must be assigned to a team to raise a query.";
              return;
            }

            this.submittingQuery = true;
            try {
              const res = await api("/api/employee/queries", {
                method: "POST",
                body: JSON.stringify({
                  subject: this.newQuery.subject,
                  message: this.newQuery.message,
                }),
              });
              if (res.success) {
                this.toast("Query submitted to your manager!", "success");
                this.modal = "";
                this.newQuery = { subject: "", message: "" };
                // Refresh queries list
                const queriesRes = await api("/api/employee/queries");
                this.queries = queriesRes.data || [];
                this.$nextTick(() => lucide.createIcons());
              } else {
                this.queryError = res.error || "Failed to submit query.";
              }
            } catch (err) {
              this.queryError = "Network error. Please try again.";
            } finally {
              this.submittingQuery = false;
            }
          },

          // ─── Logout ──────────────────────────────────────────────────────────────
          logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("user");
            location.href = "../login.html";
          },

          // ─── Toast helper ─────────────────────────────────────────────────────────
          toast(msg, type = "success") {
            const id = Date.now();
            this.toasts.push({ id, msg, type });
            setTimeout(() => {
              this.toasts = this.toasts.filter((t) => t.id !== id);
              lucide.createIcons();
            }, 3500);
          },
          async loadChat() {
            try {
              const res = await api("/api/employee/chat");
              if (res.success) {
                this.chatMessages = res.data;
                this.$nextTick(() => this.scrollToBottom());
              }
            } catch (err) {
              console.error(err);
            }
          },

          scrollToBottom() {
            const el = this.$refs.msgList;
            if (el) el.scrollTop = el.scrollHeight;
          },

          // ── Send message ──────────────────────────────
          async sendMessage() {
            const msg = this.chatInput.trim();
            if (!msg) return;
            this.chatInput = "";
            this.suggestions = [];
            try {
              const res = await api("/api/employee/chat", {
                method: "POST",
                body: JSON.stringify({ message: msg }),
              });
              if (res.success) {
                this.chatMessages.push(res.data);
                this.$nextTick(() => this.scrollToBottom());
              }
            } catch (err) {
              console.error(err);
            }
          },

          // ── Format message — highlight @mentions and #projects ──
          formatMessage(text) {
            if (!text) return "";
            return text
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;")
              .replace(
                /@(\w[\w\s]*?)(?=\s|$|[,.!?])/g,
                '<span class="chat-mention">@$1</span>',
              )
              .replace(
                /#(\w[\w\s]*?)(?=\s|$|[,.!?])/g,
                '<span class="chat-hashtag">#$1</span>',
              );
          },

          formatTime(ts) {
            if (!ts) return "";
            return new Date(ts).toLocaleTimeString("en-IN", {
              hour: "2-digit",
              minute: "2-digit",
              hour12: true,
            });
          },

          // ── Handle @ and # triggers ───────────────────
          onChatInput(e) {
            const val = e.target.value;
            const pos = e.target.selectionStart;

            // Find last @ or # before cursor
            let triggerPos = -1;
            let trigger = null;
            for (let i = pos - 1; i >= 0; i--) {
              if (val[i] === "@") {
                triggerPos = i;
                trigger = "@";
                break;
              }
              if (val[i] === "#") {
                triggerPos = i;
                trigger = "#";
                break;
              }
              if (val[i] === " " || val[i] === "\n") break;
            }

            if (trigger && triggerPos >= 0) {
              const query = val.slice(triggerPos + 1, pos).toLowerCase();
              this.suggestTrigger = trigger;
              this.suggestStart = triggerPos;
              this.suggestIdx = 0;

              if (trigger === "@") {
                // Suggest team members
                const members = this.team?.members ?? [];
                this.suggestions = members
                  .filter(
                    (m) =>
                      m.name.toLowerCase().includes(query) &&
                      m.user_id !== this.user?.user_id,
                  )
                  .map((m) => ({ id: m.user_id, label: m.name, type: "user" }))
                  .slice(0, 5);
              } else {
                // Suggest projects
                this.suggestions = this.tasks
                  .map((t) => t.project_name)
                  .filter((v, i, a) => v && a.indexOf(v) === i) // unique
                  .filter((p) => p.toLowerCase().includes(query))
                  .map((p, i) => ({ id: i, label: p, type: "project" }))
                  .slice(0, 5);
              }
            } else {
              this.suggestions = [];
            }
          },

          onChatKeydown(e) {
            if (this.suggestions.length > 0) {
              if (e.key === "ArrowDown") {
                e.preventDefault();
                this.suggestIdx = Math.min(
                  this.suggestIdx + 1,
                  this.suggestions.length - 1,
                );
              }
              if (e.key === "ArrowUp") {
                e.preventDefault();
                this.suggestIdx = Math.max(this.suggestIdx - 1, 0);
              }
              if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                this.insertSuggestion(this.suggestions[this.suggestIdx]);
                return;
              }
              if (e.key === "Escape") {
                this.suggestions = [];
                return;
              }
            }
            if (e.key === "Enter" && !e.shiftKey) {
              e.preventDefault();
              this.sendMessage();
            }
          },

          insertSuggestion(s) {
            const val = this.chatInput;
            const before = val.slice(0, this.suggestStart);
            const after = val.slice(this.$refs.chatInput.selectionStart);
            const prefix = this.suggestTrigger;
            this.chatInput = before + prefix + s.label + " " + after;
            this.suggestions = [];
            this.$nextTick(() => {
              const inp = this.$refs.chatInput;
              const pos = (before + prefix + s.label + " ").length;
              inp.focus();
              inp.setSelectionRange(pos, pos);
            });
          },
        };
      }

      // ─── Theme toggle ─────────────────────────────────────────────────────────────
      (function () {
        const t = document.querySelector("[data-theme-toggle]");
        const r = document.documentElement;
        let d =
          localStorage.getItem("theme") ||
          (matchMedia("(prefers-color-scheme:dark)").matches
            ? "dark"
            : "light");
        r.setAttribute("data-theme", d);
        if (t) {
          t.addEventListener("click", () => {
            d = d === "dark" ? "light" : "dark";
            r.setAttribute("data-theme", d);
            localStorage.setItem("theme", d);
            lucide.createIcons();
          });
        }
      })();

      lucide.createIcons();
    </script>
  </body>
</html>
